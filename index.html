<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Entrevista de Visa — Cristina</title>
<style>
  :root{
    --navy:#0a2540;
    --navy-dark:#061a30;
    --gold:#c8a24b;
    --cream:#f5efe4;
    --paper:#fffdf7;
    --green:#2e7d4f;
    --red:#b3331f;
    --amber:#c6892c;
    --ink:#1a1a1a;
    --shadow:0 10px 30px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;font-family:'Georgia','Times New Roman',serif;background:linear-gradient(180deg,#0a2540 0%, #061a30 100%);color:var(--ink)}
  body{display:flex;align-items:center;justify-content:center;padding:20px}
  #app{width:100%;max-width:820px}
  .card{background:var(--paper);border-radius:14px;padding:34px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy))}
  h1{font-size:28px;margin:0 0 10px;color:var(--navy);letter-spacing:.3px}
  h2{font-size:22px;margin:0 0 16px;color:var(--navy)}
  p{line-height:1.6;font-size:17px}
  .muted{color:#666;font-size:14px;line-height:1.55}
  .center{text-align:center}
  .btn{display:inline-block;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:14px 26px;font-size:16px;font-family:inherit;cursor:pointer;transition:transform .1s, background .2s;font-weight:bold;letter-spacing:.3px}
  .btn:hover{background:var(--navy-dark)}
  .btn:active{transform:scale(.97)}
  .btn.gold{background:var(--gold);color:var(--navy-dark)}
  .btn.gold:hover{background:#b08f3d}
  .btn.ghost{background:transparent;color:var(--navy);border:2px solid var(--navy)}
  .btn.ghost:hover{background:var(--navy);color:#fff}
  .btn.sm{padding:9px 16px;font-size:14px}
  .btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
  .spacer{flex:1}

  /* Setup form */
  .field{margin:14px 0}
  .field label{display:block;font-size:13px;font-weight:bold;color:var(--navy);margin-bottom:5px;letter-spacing:.3px}
  .field input{width:100%;border:2px solid #e0d8c4;border-radius:8px;padding:11px 13px;font-family:inherit;font-size:15px;background:#fff}
  .field input:focus{outline:none;border-color:var(--navy)}
  .field .ex{font-size:12px;color:#999;margin-top:3px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  @media (max-width:560px){.grid2{grid-template-columns:1fr}}

  /* Outfits */
  .outfit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:20px 0}
  .outfit{background:#fff;border:2px solid #e0d8c4;border-radius:10px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .15s}
  .outfit:hover{border-color:var(--gold);transform:translateY(-3px)}
  .outfit.selected{border-color:var(--green);background:#f0f8f2;box-shadow:0 4px 12px rgba(46,125,79,.2)}
  .outfit .emoji{font-size:54px;line-height:1;margin-bottom:8px;display:block}
  .outfit .name{font-weight:bold;color:var(--navy);font-size:14px;display:block;margin-bottom:4px}
  .outfit .hint{font-size:12px;color:#777;display:block}

  /* Documents checklist */
  .doc{display:flex;align-items:flex-start;gap:12px;background:#fff;border:2px solid #e0d8c4;border-radius:10px;padding:13px 15px;margin:10px 0;cursor:pointer;transition:all .12s}
  .doc:hover{border-color:var(--gold)}
  .doc.checked{border-color:var(--green);background:#f0f8f2}
  .doc .box{width:24px;height:24px;border:2px solid #bbb;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;transition:all .12s}
  .doc.checked .box{background:var(--green);border-color:var(--green)}
  .doc .txt{font-size:15px;line-height:1.4}
  .doc .txt b{color:var(--navy)}

  /* Ventanilla */
  .embassy{background:linear-gradient(180deg,#3a4a5c 0%, #2a3848 100%);border-radius:12px;padding:20px;margin:8px 0 18px;position:relative;color:#fff}
  .embassy-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#c8a24b}
  .window{background:#1a2533;border:4px solid #2a3848;border-radius:8px;padding:20px;position:relative;display:flex;align-items:center;gap:18px}
  .officer{font-size:60px;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));transition:transform .2s}
  .officer-info{flex:1}
  .officer-name{font-size:12px;color:#c8a24b;letter-spacing:1px;margin-bottom:6px}
  .officer-mood{font-size:13px;color:#cdd5e0;font-style:italic}
  .cat-chip{display:inline-block;background:rgba(200,162,75,.18);color:#e6c987;border:1px solid rgba(200,162,75,.4);padding:2px 9px;border-radius:20px;font-size:11px;letter-spacing:.5px;margin-top:8px}

  /* Confidence meter */
  .meter-wrap{margin-top:14px}
  .meter-label{display:flex;justify-content:space-between;font-size:11px;color:#cdd5e0;letter-spacing:.5px;margin-bottom:5px;text-transform:uppercase}
  .meter{height:10px;background:#1a2533;border-radius:6px;overflow:hidden}
  .meter-fill{height:100%;border-radius:6px;transition:width .5s ease, background .5s ease;width:55%}

  .speech{background:var(--cream);color:var(--ink);padding:18px 20px;border-radius:10px;margin-top:16px;position:relative;font-size:18px;line-height:1.5;font-style:italic}
  .speech::before{content:"";position:absolute;top:-10px;left:30px;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:10px solid var(--cream)}
  .speech .label{display:block;font-style:normal;font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:6px;font-weight:bold}

  /* Mode toggle */
  .mode-toggle{display:flex;background:#e8e0cc;border-radius:8px;padding:4px;margin:6px 0 14px;gap:4px}
  .mode-toggle button{flex:1;background:transparent;border:none;padding:10px;font-family:inherit;font-size:14px;cursor:pointer;border-radius:6px;color:#666;font-weight:bold}
  .mode-toggle button.active{background:var(--navy);color:#fff}

  /* Options */
  .options{display:flex;flex-direction:column;gap:10px;margin:8px 0}
  .option{background:#fff;border:2px solid #e0d8c4;border-radius:10px;padding:14px 16px;text-align:left;cursor:pointer;font-family:inherit;font-size:15px;line-height:1.5;color:var(--ink);transition:all .12s;display:flex;gap:12px;align-items:flex-start}
  .option:hover:not(:disabled){border-color:var(--navy);background:#fafaf5}
  .option:disabled{cursor:default}
  .option .num{flex-shrink:0;width:24px;height:24px;background:#eee;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#888}
  .option.picked.good{border-color:var(--green);background:#eaf6ee}
  .option.picked.mid{border-color:var(--amber);background:#fdf5e6}
  .option.picked.bad{border-color:var(--red);background:#fbeae6}
  .option.reveal-good{border-color:var(--green);background:#eaf6ee}
  .option.dim{opacity:.5}

  textarea{width:100%;min-height:110px;border:2px solid #e0d8c4;border-radius:10px;padding:14px;font-family:inherit;font-size:15px;line-height:1.5;resize:vertical;background:#fff}
  textarea:focus{outline:none;border-color:var(--navy)}

  .feedback{margin-top:14px;padding:15px 17px;border-radius:10px;border-left:5px solid var(--navy);background:#f5efe4;font-size:15px;line-height:1.55}
  .feedback.good{border-left-color:var(--green);background:#eaf6ee}
  .feedback.mid{border-left-color:var(--amber);background:#fdf5e6}
  .feedback.bad{border-left-color:var(--red);background:#fbeae6}
  .feedback strong{display:block;margin-bottom:5px;font-size:13px;letter-spacing:.5px;text-transform:uppercase}
  .model-ans{margin-top:10px;padding:11px 14px;background:#eef4ee;border:1px dashed var(--green);border-radius:8px;font-size:14px;line-height:1.5}
  .model-ans b{color:var(--green)}

  /* Result */
  .stamp{display:inline-block;border:4px solid;padding:14px 28px;font-size:30px;font-weight:bold;letter-spacing:3px;transform:rotate(-5deg);text-transform:uppercase;margin:12px 0;font-family:'Arial Black','Arial',sans-serif}
  .stamp.approved{color:var(--green);border-color:var(--green)}
  .stamp.pending{color:var(--amber);border-color:var(--amber)}
  .stamp.denied{color:var(--red);border-color:var(--red)}

  .score-row{display:flex;justify-content:space-around;gap:10px;margin:18px 0;text-align:center;flex-wrap:wrap}
  .score-box{flex:1;min-width:90px;background:#f5efe4;padding:14px;border-radius:10px}
  .score-box .num{font-size:28px;font-weight:bold;display:block}
  .score-box.g .num{color:var(--green)}
  .score-box.m .num{color:var(--amber)}
  .score-box.b .num{color:var(--red)}
  .score-box .lbl{font-size:11px;color:#666;letter-spacing:1px}

  .cat-result{margin:8px 0}
  .cat-result .row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:14px}
  .cat-result .row .name{width:130px;flex-shrink:0;color:var(--navy);font-weight:bold;font-size:13px}
  .cat-result .bar{flex:1;height:9px;background:#e8e0cc;border-radius:5px;overflow:hidden}
  .cat-result .bar span{display:block;height:100%;border-radius:5px}

  .tips{background:#f5efe4;padding:18px;border-radius:10px;margin:16px 0}
  .tips h3{margin:0 0 10px;color:var(--navy);font-size:16px}
  .tips ul{margin:0;padding-left:20px}
  .tips li{margin:7px 0;font-size:14px;line-height:1.5}

  .badge{display:inline-block;background:var(--gold);color:var(--navy-dark);padding:4px 11px;border-radius:20px;font-size:12px;font-weight:bold;letter-spacing:1px;margin-bottom:12px}
  .pill{display:inline-block;background:#eef0f4;color:var(--navy);padding:5px 12px;border-radius:20px;font-size:13px;margin:3px 4px 3px 0;border:1px solid #dde}

  @media (max-width:560px){
    .card{padding:24px 20px}
    h1{font-size:23px}
    .officer{font-size:48px}
    .stamp{font-size:22px;letter-spacing:2px}
    .speech{font-size:16px}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ================================================================
   PERFIL — datos que Cristina puede personalizar (opcional).
   Las "buenas respuestas" usan estos datos para sonar como SU caso.
   ================================================================ */
const PROFILE = {
  nombre:"Cristina", pais:"Panamá", ciudadOrigen:"La Chorrera", ocupacion:"la UTP en Panamá Pacífico", tiempoOcup:"",
  visita:"mi mamá", ciudadUS:"Nueva Jersey", duracion:"", alojamiento:"", pago:"", vivesCon:"mi abuela y mi tía"
};
const FALLBACK = {
  nombre:"Cristina",
  pais:"Panamá",
  ciudadOrigen:"La Chorrera",
  ocupacion:"mi trabajo",
  tiempoOcup:"varios años",
  visita:"mi mamá",
  ciudadUS:"la ciudad donde vive mi mamá",
  duracion:"dos semanas",
  alojamiento:"en casa de una amiga de la familia",
  pago:"yo, con mis ahorros",
  vivesCon:"mi abuela y mi tía"
};
function val(key){ return (PROFILE[key] && PROFILE[key].trim()) ? PROFILE[key].trim() : FALLBACK[key]; }
function fills(str){ return str.replace(/\{(\w+)\}/g, (_,k)=> val(k)); }

/* ================================================================
   BANCO DE PREGUNTAS — basado en preguntas REALES de entrevistas
   B1/B2 (fuentes: Boundless, RumboVisa, guías consulares 2025).
   rating: good = ideal | mid = aceptable/mejorable | bad = bandera roja
   ================================================================ */
const QUESTIONS = [
/* ---------- PROPÓSITO DEL VIAJE ---------- */
{ cat:"proposito", key:true,
  q:"Buenos días. ¿Cuál es el motivo de su viaje a Estados Unidos?",
  keywords:["visitar","turismo","conocer","mamá","mama","familia","vacaciones","paseo","pasear"],
  options:[
    {text:"Voy como turista al Mundial de fútbol. Me quedo {duracion} y regreso a {pais}.", rating:"good",
     feedback:"Respuesta fuerte: turismo claro y temporal (el Mundial termina y vuelves). No tienes que mencionar a tu mamá por iniciativa propia — pero OJO: si te preguntan directamente por familia en EE.UU., debes decir la verdad."},
    {text:"Quiero ir a buscar oportunidades y ver cómo me va por allá.", rating:"bad",
     feedback:"'Buscar oportunidades' es bandera roja inmediata. El oficial asume intención de quedarse a trabajar. Visa negada casi seguro."},
    {text:"A ver el Mundial.", rating:"mid",
     feedback:"Buena razón, pero demasiado seca. Agrega cuánto tiempo te quedas y que regresas — y prepárate, porque lo siguiente que te van a preguntar es si tienes entradas."}
  ]},
{ cat:"proposito",
  q:"¿Y qué va a hacer exactamente durante su estancia?",
  keywords:["visitar","pasear","conocer","mamá","mama","compras","turistear"],
  options:[
    {text:"Pasar tiempo con {visita}, conocer la ciudad, tal vez ir de compras. Plan tranquilo de turista.", rating:"good",
     feedback:"Plan concreto y realista de turista. Transmite que tienes claro tu viaje."},
    {text:"Todavía no sé bien, depende de lo que surja allá.", rating:"bad",
     feedback:"No tener plan suena a que vas a 'ver qué pasa'. Eso preocupa al oficial. Ten un itinerario aunque sea sencillo."},
    {text:"Descansar y ya veré.", rating:"mid",
     feedback:"Vago. Da 2 o 3 actividades concretas para que suene un viaje planeado, no improvisado."}
  ]},
{ cat:"proposito",
  q:"¿Por qué quiere viajar justo en esta fecha?",
  keywords:["vacaciones","permiso","cumpleaños","fechas","libre","aproveché","aproveche"],
  options:[
    {text:"Pedí vacaciones en {ocupacion} para estas fechas y me coincidió bien para visitar a {visita}.", rating:"good",
     feedback:"Conectas la fecha con tus vacaciones laborales: refuerza que tienes a qué volver."},
    {text:"Porque ya no aguantaba las ganas de irme.", rating:"mid",
     feedback:"Suena impulsivo. Mejor liga la fecha a algo concreto: vacaciones, un evento familiar, temporada."},
    {text:"Porque cuanto antes salga de aquí, mejor.", rating:"bad",
     feedback:"Hablar mal de tu país sugiere que no quieres volver. Nunca des esa impresión."}
  ]},
{ cat:"proposito",
  q:"¿A qué lugares o ciudades piensa ir?",
  keywords:["ciudad","quedo","mamá","mama","conocer","alrededor"],
  options:[
    {text:"Principalmente a {ciudadUS}, donde está {visita}, y quizá algún lugar cercano un día.", rating:"good",
     feedback:"Itinerario coherente con tu motivo. Sencillo y creíble."},
    {text:"Quiero recorrer medio país en estas semanas.", rating:"mid",
     feedback:"Un itinerario gigante en poco tiempo y bajo presupuesto suena poco creíble. Mantenlo realista."},
    {text:"No tengo idea, voy viendo.", rating:"bad",
     feedback:"Falta de plan otra vez. Ten al menos la ciudad principal clara."}
  ]},
/* ---------- MUNDIAL 2026 (razón de viaje de Cristina) ---------- */
{ cat:"proposito", key:true,
  q:"Veo que va por el Mundial. ¿A qué partidos o ciudades piensa ir?",
  keywords:["partido","partidos","entradas","boletos","estadio","ciudad","mundial","tengo"],
  options:[
    {text:"Tengo entradas para [partido/ciudad]; aquí está la confirmación de las entradas.", rating:"good",
     feedback:"Tener entradas concretas y la confirmación a la mano hace que tu motivo sea real y verificable. Muy bien."},
    {text:"Todavía no decido bien a cuáles, estoy viendo disponibilidad.", rating:"mid",
     feedback:"Si el Mundial es tu razón principal, debes tener al menos los partidos/ciudades definidos. Lleva tus entradas o confirmaciones."},
    {text:"A los que pueda, todavía no he comprado nada.", rating:"bad",
     feedback:"Sin entradas ni plan, el Mundial suena a pretexto y el oficial lo notará. Compra las entradas antes de la entrevista."}
  ]},
{ cat:"proposito",
  q:"¿Ya compró las entradas para los partidos?",
  keywords:["sí","si","compré","compre","entradas","boletos","confirmación","confirmacion"],
  options:[
    {text:"Sí, ya las compré y tengo la confirmación impresa para mostrarle.", rating:"good",
     feedback:"Entradas compradas = prueba sólida de que tu viaje es real y con propósito turístico claro."},
    {text:"No, las compro cuando llegue allá.", rating:"bad",
     feedback:"Decir que comprarás todo al llegar debilita tu motivo. Lleva las entradas ya compradas como respaldo."},
    {text:"Estoy en proceso de comprarlas.", rating:"mid",
     feedback:"Mejor tenerlas listas antes de la cita. Si no, al menos lleva el comprobante de la reserva o intento de compra."}
  ]},

/* ---------- DURACIÓN / REGRESO ---------- */
{ cat:"tiempo", key:true,
  q:"¿Cuánto tiempo piensa quedarse en Estados Unidos?",
  keywords:["semanas","semana","días","dias","dos","tres","quince","duracion"],
  options:[
    {text:"{duracion}. Mi vuelo de regreso ya está reservado.", rating:"good",
     feedback:"Tiempo corto y específico + vuelo de regreso reservado = señal fuerte de que vas a volver."},
    {text:"No estoy segura, depende de cómo me sienta allá.", rating:"bad",
     feedback:"Estancia indefinida = posible inmigrante. Siempre da un periodo corto y concreto."},
    {text:"Como un mes, más o menos.", rating:"mid",
     feedback:"Aceptable, pero impreciso. Da fechas y menciona que el vuelo de vuelta ya está comprado."}
  ]},
{ cat:"tiempo",
  q:"¿Ya tiene su boleto de regreso? ¿Para cuándo?",
  keywords:["sí","si","vuelo","boleto","regreso","reservado","comprado","fecha"],
  options:[
    {text:"Sí, vuelo de ida y vuelta. Regreso al terminar {duracion}.", rating:"good",
     feedback:"Boleto de vuelta comprado es de las pruebas más fuertes de intención de regresar."},
    {text:"Solo compré la ida por ahora.", rating:"bad",
     feedback:"Comprar solo la ida es una de las banderas rojas más clásicas. Compra ida y vuelta antes de la entrevista."},
    {text:"Lo compro cuando me den la visa.", rating:"mid",
     feedback:"Entendible por costos, pero ten al menos un itinerario tentativo con fecha de regreso clara para mencionar."}
  ]},
/* ---------- ALOJAMIENTO ---------- */
{ cat:"alojamiento", key:true,
  q:"¿Dónde se va a quedar durante su visita?",
  keywords:["casa","amiga","amigo","familiar","dirección","direccion","hotel","mamá","mama"],
  options:[
    {text:"{alojamiento}, en {ciudadUS}. Tengo la dirección y una carta de invitación.", rating:"good",
     feedback:"Lugar específico, relación clara y documentos listos. Excelente."},
    {text:"Por ahí, todavía no lo decidimos bien.", rating:"bad",
     feedback:"Sin lugar definido = sospechoso. Debes saber exactamente dónde vas a dormir."},
    {text:"Con alguien que conoce {visita}.", rating:"mid",
     feedback:"Demasiado vago. Necesitas nombre, dirección y relación clara; mejor con carta de invitación."}
  ]},
{ cat:"alojamiento", key:true,
  q:"¿Conoce bien a la persona en cuya casa se va a quedar?",
  keywords:["sí","si","amiga","años","conozco","familia","confianza"],
  options:[
    {text:"Sí, es {alojamiento}; la conozco desde hace años por mi familia.", rating:"good",
     feedback:"Relación de confianza y de tiempo. Reduce sospechas."},
    {text:"No mucho, pero {visita} la conoce.", rating:"bad",
     feedback:"Quedarte con un casi-desconocido preocupa al oficial. Deja claro el vínculo real y de cuánto tiempo."},
    {text:"La contacté hace poco para que me reciba.", rating:"bad",
     feedback:"Eso enciende alarmas. Si tu caso es así, considera reservar un hotel para mostrar independencia."}
  ]},
{ cat:"alojamiento",
  q:"¿Me puede dar la dirección donde se hospedará?",
  keywords:["dirección","direccion","calle","ciudad","apunté","apunte","tengo"],
  options:[
    {text:"Sí, la tengo apuntada aquí en {ciudadUS}, se la muestro.", rating:"good",
     feedback:"Tener la dirección a la mano demuestra organización y honestidad."},
    {text:"No me la sé de memoria, pero {visita} la tiene.", rating:"mid",
     feedback:"Llévala anotada o en el teléfono. No saber dónde dormirás se ve improvisado."},
    {text:"No sé, llego y veo.", rating:"bad",
     feedback:"Inaceptable para el oficial. Debes saber tu alojamiento exacto."}
  ]},
/* ---------- FAMILIA (clave para el caso de Cristina) ---------- */
{ cat:"familia", key:true,
  q:"¿Tiene familiares o amigos viviendo en Estados Unidos?",
  keywords:["sí","si","mamá","mama","vive","familiar"],
  options:[
    {text:"Sí, {visita} vive allá; justamente por eso voy a visitarla. Pero mi vida está en {pais}.", rating:"good",
     feedback:"Honestidad total + reafirmas que tu vida (y tu regreso) está en tu país. Combinación ganadora."},
    {text:"No, a nadie.", rating:"bad",
     feedback:"NUNCA mientas. Si tu mamá está allá, el consulado lo sabe. Una mentira = negación y problemas futuros."},
    {text:"Sí, pero casi no tengo contacto con ellos.", rating:"mid",
     feedback:"Si la vas a visitar, restarle importancia suena contradictorio. Sé directa y natural."}
  ]},
{ cat:"familia", key:true,
  q:"Tengo entendido que su mamá vive en Estados Unidos. ¿Qué estatus tiene y hace cuánto está allá?",
  keywords:["residente","ciudadana","años","trabaja","legal","papeles"],
  options:[
    {text:"Sí, es residente legal; lleva varios años trabajando allá con sus papeles en regla.", rating:"good",
     feedback:"Directo y tranquilo. Que ella esté legal te ayuda: no representas riesgo de inmigración irregular. Conoce su estatus exacto."},
    {text:"Prefiero no hablar de la situación de mi mamá.", rating:"bad",
     feedback:"Evadir genera sospecha inmediata. Si su situación es legal, dilo con calma; es información que ya tienen."},
    {text:"No sé bien qué papeles tiene.", rating:"mid",
     feedback:"Antes de la entrevista averigua el estatus de tu mamá, hace cuánto está y en qué trabaja. No saberlo se ve mal."}
  ]},
{ cat:"familia", key:true,
  q:"Su mamá viajó antes a Estados Unidos pero regresó a su país. ¿Por qué regresó?",

function faceFor(c){
  if(c>=75) return {emoji:"🙂", mood:"El oficial asiente, parece convencido."};
  if(c>=55) return {emoji:"😐", mood:"El oficial mantiene una cara neutral."};
  if(c>=35) return {emoji:"🤨", mood:"El oficial te mira con duda."};
  return {emoji:"😠", mood:"El oficial frunce el ceño, no está convencido."};
}
function meterColor(c){
  if(c>=70) return "var(--green)";
  if(c>=45) return "var(--amber)";
  return "var(--red)";
}

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function applyRating(rating){
  STATE.score[rating]++;
  if(rating==="good") STATE.confidence = Math.min(100, STATE.confidence+13);
  else if(rating==="bad") STATE.confidence = Math.max(0, STATE.confidence-16);
  else STATE.confidence = Math.max(0, STATE.confidence-1);
}

function selectOutfit(id,el){
  STATE.outfit=id;
  document.querySelectorAll(".outfit").forEach(o=>o.classList.remove("selected"));
  el.classList.add("selected");
  const o=OUTFITS.find(x=>x.id===id);
  const cls=o.verdict==="good"?"good":o.verdict==="mid"?"mid":"bad";
  document.getElementById("outfitNote").innerHTML=`<div class="feedback ${cls}"><strong>Nota</strong>${o.note}</div>`;
  document.getElementById("nextOutfit").disabled=false;
}

    el.innerHTML=`<div class="box"></div><div class="txt">${d.t}</div>`;
    el.onclick=()=>{el.classList.toggle("checked");el.querySelector(".box").textContent=el.classList.contains("checked")?"✓":"";};
    list.appendChild(el);
  });
}

/* ---------- Embajada ---------- */
function goEmbassy(){
  render(`
    <span class="badge">EMBAJADA DE EE.UU.</span>
    <h1>Llegaste 🏛️</h1>
    <p>Pasaste la fila, el control de seguridad y la sala de espera. De repente, una voz por el altavoz dice tu número.</p>
    <p style="font-size:21px;text-align:center;color:var(--navy);font-weight:bold;margin:24px 0">"Ventanilla 7, por favor."</p>
    <p>Caminas hacia la ventanilla. Detrás del vidrio, un oficial consular te espera y revisa una pantalla.</p>
    <p class="muted">Recuerda: mira a los ojos, responde corto y directo, no inventes nada. Si no sabes algo, dilo. La entrevista real dura solo 3–5 minutos.</p>
    <div class="field" style="max-width:320px">
      <label>¿Cuántas preguntas quieres practicar?</label>
      <div class="mode-toggle" style="margin-top:6px">
        <button id="len10" class="active" onclick="setLen(10,this)">Corta (10)</button>
        <button id="len16" onclick="setLen(16,this)">Larga (16)</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn ghost" onclick="goDocs()">← Atrás</button>
      <div class="spacer"></div>
      <button class="btn gold" onclick="startInterview()">Acercarse a la ventanilla →</button>
    </div>
  `);
}
function setLen(n,btn){
  STATE.length=n;
  document.querySelectorAll(".mode-toggle button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* ---------- Selección balanceada de preguntas ---------- */
function buildInterview(n){
  const keys=QUESTIONS.filter(q=>q.key);
  const rest=shuffle(QUESTIONS.filter(q=>!q.key));
  let sel=shuffle(keys).slice(0, Math.min(keys.length, Math.ceil(n*0.6)));
  for(const q of rest){ if(sel.length>=n) break; sel.push(q); }
  sel=sel.slice(0,n);
  // Ordenar para que fluya: propósito primero, trampa/cierre al final
  const order={proposito:1,tiempo:2,alojamiento:3,familia:4,finanzas:5,lazos:6,historial:7,trampa:8};
  return shuffle(sel).sort((a,b)=>(order[a.cat]||5)-(order[b.cat]||5));
}

function startInterview(){
  STATE.questions=buildInterview(STATE.length);
  STATE.current=0;
  STATE.confidence=55;
  STATE.score={good:0,mid:0,bad:0};
  STATE.catScore={};
  renderQuestion();
}

function renderQuestion(){
  const q=STATE.questions[STATE.current];
  const face=faceFor(STATE.confidence);
  STATE.answered=false;
  render(`
    <div class="embassy">
      <div class="embassy-header">
        <span>U.S. EMBASSY · CONSULAR SECTION</span>
        <span>Pregunta ${STATE.current+1} / ${STATE.questions.length}</span>
      </div>
      <div class="window">
        <div class="officer" id="officerFace">${face.emoji}</div>
        <div class="officer-info">
          <div class="officer-name">OFICIAL CONSULAR · VENTANILLA 7</div>
          <div class="officer-mood" id="officerMood">${face.mood}</div>
          <span class="cat-chip">${CAT_LABELS[q.cat]||""}</span>
        </div>
      </div>
      <div class="meter-wrap">
        <div class="meter-label"><span>Confianza del oficial</span><span id="confPct">${STATE.confidence}%</span></div>
        <div class="meter"><div class="meter-fill" id="confFill" style="width:${STATE.confidence}%;background:${meterColor(STATE.confidence)}"></div></div>
      </div>
      <div class="speech"><span class="label">EL OFICIAL PREGUNTA</span>${fills(q.q)}</div>
    </div>

    <div class="mode-toggle">
      <button class="${STATE.mode==='easy'?'active':''}" onclick="setMode('easy',this)">Modo fácil · escoger respuesta</button>
      <button class="${STATE.mode==='hard'?'active':''}" onclick="setMode('hard',this)">Modo difícil · responder yo</button>
    </div>

    <div id="answerArea"></div>
    <div id="feedbackArea"></div>
    <div class="btn-row" id="navArea">
      <button class="btn ghost sm" onclick="confirmQuit()">Salir</button>
    </div>
  `);
  if(STATE.mode==="easy") renderEasy(); else renderHard();
}

function setMode(m,btn){
  STATE.mode=m;
  document.querySelectorAll(".mode-toggle button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(STATE.answered) return;
  if(m==="easy") renderEasy(); else renderHard();
}

function renderEasy(){
  const q=STATE.questions[STATE.current];
  const opts=shuffle(q.options);
  const area=document.getElementById("answerArea");
  area.innerHTML=`<div class="options">${
    opts.map((o,i)=>`<button class="option" data-i="${i}" onclick="pickOption(${i})"><span class="num">${i+1}</span><span>${fills(o.text)}</span></button>`).join("")
  }</div>`;
  area.dataset.opts=JSON.stringify(opts);
  document.getElementById("feedbackArea").innerHTML="";
}

function renderHard(){
  const area=document.getElementById("answerArea");
  area.innerHTML=`
    <textarea id="freeAnswer" placeholder="Escribe (o di en voz alta y luego escribe) lo que responderías... Sé breve y específica."></textarea>
    <div class="btn-row"><button class="btn" onclick="submitFree()">Responder al oficial</button></div>
  `;
  document.getElementById("feedbackArea").innerHTML="";
}

function updateMeter(){
  const face=faceFor(STATE.confidence);
  const f=document.getElementById("officerFace");
  const m=document.getElementById("officerMood");
  const fill=document.getElementById("confFill");
  const pct=document.getElementById("confPct");
  if(f){f.textContent=face.emoji;f.style.transform="scale(1.15)";setTimeout(()=>f.style.transform="scale(1)",200);}
  if(m) m.textContent=face.mood;
  if(fill){fill.style.width=STATE.confidence+"%";fill.style.background=meterColor(STATE.confidence);}
  if(pct) pct.textContent=STATE.confidence+"%";
}

function recordCat(cat,rating){
  if(!STATE.catScore[cat]) STATE.catScore[cat]={good:0,total:0};
  STATE.catScore[cat].total++;
  if(rating==="good") STATE.catScore[cat].good++;
  else if(rating==="mid") STATE.catScore[cat].good+=0.5;
}

function pickOption(i){
  if(STATE.answered) return;
  STATE.answered=true;
  const q=STATE.questions[STATE.current];
  const area=document.getElementById("answerArea");
  const opts=JSON.parse(area.dataset.opts);
  const chosen=opts[i];
  applyRating(chosen.rating);
  recordCat(q.cat,chosen.rating);
  updateMeter();

  const goodIdx=opts.findIndex(o=>o.rating==="good");
  document.querySelectorAll(".option").forEach((btn,idx)=>{
    btn.disabled=true;
    if(idx===i) btn.classList.add("picked",chosen.rating);
    else if(idx===goodIdx && chosen.rating!=="good") btn.classList.add("reveal-good");
    else btn.classList.add("dim");
  });

  let modelHtml="";
  if(chosen.rating!=="good" && goodIdx>=0){
    modelHtml=`<div class="model-ans"><b>✓ La respuesta más fuerte era:</b> "${fills(opts[goodIdx].text)}"</div>`;
  }
  showFeedback(chosen.rating, pick(OFFICER_REACTIONS[chosen.rating]), chosen.feedback, modelHtml);
  showNext();
}

function submitFree(){
  if(STATE.answered) return;
  const text=document.getElementById("freeAnswer").value.trim();
  if(text.length<3){alert("Escribe algo primero 🙂");return;}
  STATE.answered=true;
  const q=STATE.questions[STATE.current];
  const rating=evaluateFree(text,q);
  applyRating(rating);
  recordCat(q.cat,rating);
  updateMeter();
  document.getElementById("freeAnswer").disabled=true;

  const good=q.options.find(o=>o.rating==="good");
  const modelHtml=good?`<div class="model-ans"><b>💡 Respuesta modelo:</b> "${fills(good.text)}"</div>`:"";
  showFeedback(rating, pick(OFFICER_REACTIONS[rating]), freeTip(rating,q), modelHtml);
  showNext();
}

function evaluateFree(text,q){
  const t=" "+text.toLowerCase()+" ";
  const words=text.trim().split(/\s+/).length;
  const hits=(q.keywords||[]).filter(k=>t.includes(k)).length;
  const redFlags=["oportunidad","quedarme","quedarme a vivir","mejor vida","trabajar all","buscar trabajo","tal vez","quizá","quiza","no sé si vuelv","no se si vuelv","depende de las oportunidad","ver cómo me va","ver como me va"];
  const redHits=redFlags.filter(r=>t.includes(r)).length;
  if(redHits>=1) return "bad";
  if(words<4) return "mid";
  if(hits>=2 && words>=6 && words<=70) return "good";
  if(hits>=1) return "mid";
  return "mid";
}
function freeTip(rating,q){
  if(rating==="good") return "Buena respuesta: tocaste los puntos clave sin extenderte de más. Compárala con la respuesta modelo de abajo.";
  if(rating==="bad")  return "Cuidado: usaste palabras que encienden alarmas (como 'oportunidad', 'quedarme', 'tal vez') o sonaste indecisa. Reformula con foco en que vas de visita y regresas. Mira la respuesta modelo.";
  return "Aceptable, pero mejorable: sé más concreta (fechas, lugares, a quién visitas) y deja claro que vas a regresar. Fíjate en la respuesta modelo de abajo.";
}

function showFeedback(rating,reaction,explanation,extra=""){
  document.getElementById("feedbackArea").innerHTML=`
    <div class="feedback ${rating}">
      <strong>Reacción del oficial</strong>
      <em>"${reaction}"</em>
      <div style="margin-top:10px">${explanation}</div>
      ${extra}
    </div>`;
}

function showNext(){
  const isLast=STATE.current===STATE.questions.length-1;
  document.getElementById("navArea").innerHTML=`
    <button class="btn ghost sm" onclick="confirmQuit()">Salir</button>
    <div class="spacer"></div>
    <button class="btn gold" onclick="nextQuestion()">${isLast?"Ver veredicto →":"Siguiente pregunta →"}</button>`;
}
function nextQuestion(){
  if(STATE.current<STATE.questions.length-1){STATE.current++;renderQuestion();}
  else screenResult();
}
function confirmQuit(){ if(confirm("¿Salir de la entrevista? Perderás el progreso de esta práctica.")) screenIntro(); }

/* ---------- Resultado ---------- */
function screenResult(){
  const {good,mid,bad}=STATE.score;
  const conf=STATE.confidence;
  let stamp,stampClass,title,message;

  if(conf>=70 && bad<=1){
    stamp="VISA APROBADA"; stampClass="approved";
    title="El oficial sonríe levemente: \"Su visa fue aprobada. Que tenga buen viaje.\"";
    message="¡Excelente, "+val("nombre")+"! Respondiste con claridad, mostraste razones sólidas para regresar a tu país y no caíste en banderas rojas. Esa es exactamente la actitud para la entrevista real.";
  } else if(conf<40 || bad>=4){
    stamp="VISA NEGADA"; stampClass="denied";
    title="El oficial desliza un papel: \"Lo siento, no califica en este momento.\" (formulario 214(b))";
    message="Varias respuestas no convencieron al oficial. No te desanimes: esto es práctica. Repasa los puntos marcados en rojo, enfócate en demostrar que regresas, y vuelve a intentarlo. En la vida real podrías volver a aplicar.";
  } else {
    stamp="EN REVISIÓN"; stampClass="pending";
    title="El oficial dice: \"Su caso necesita revisión adicional.\" (processing administrativo)";
    message="Estuviste cerca, pero algunas respuestas dejaron dudas. Repasa lo marcado en amarillo y rojo, afina tus razones para regresar, y prueba de nuevo. Vas por buen camino.";
  }

  // Desglose por categoría
  let catRows="";
  for(const cat in STATE.catScore){
    const c=STATE.catScore[cat];
    const pct=Math.round((c.good/c.total)*100);
    const color=pct>=70?"var(--green)":pct>=40?"var(--amber)":"var(--red)";
    catRows+=`<div class="row"><span class="name">${CAT_LABELS[cat]||cat}</span><div class="bar"><span style="width:${pct}%;background:${color}"></span></div><span style="font-size:12px;color:#666;width:34px;text-align:right">${pct}%</span></div>`;
  }

  render(`
    <span class="badge">VEREDICTO</span>
    <h1>Resultado de tu entrevista</h1>
    <div class="center"><span class="stamp ${stampClass}">${stamp}</span></div>
    <p class="center" style="font-style:italic;color:#555">${title}</p>
    <p>${message}</p>

    <div class="score-row">
      <div class="score-box g"><span class="num">${good}</span><span class="lbl">EXCELENTES</span></div>
      <div class="score-box m"><span class="num">${mid}</span><span class="lbl">REGULARES</span></div>
      <div class="score-box b"><span class="num">${bad}</span><span class="lbl">FLOJAS</span></div>
    </div>

    <h2 style="font-size:17px;margin:18px 0 6px">Tu desempeño por tema</h2>
    <div class="cat-result">${catRows}</div>

    <div class="tips">
      <h3>📌 Reglas de oro (basadas en lo que evalúan los oficiales)</h3>
      <ul>
        <li><b>Respuestas cortas y directas.</b> La entrevista dura 3–5 min; responde solo lo que te preguntan.</li>
        <li><b>Demuestra que vas a volver.</b> Es la razón #1 de negaciones: muestra varios lazos (empleo, familia, estudios, bienes).</li>
        <li><b>Nunca mientas.</b> Sobre tu mamá, sobre negaciones previas, sobre nada. Todo está en su sistema y debe coincidir con tu DS-160.</li>
        <li><b>Evita palabras peligrosas:</b> "oportunidades", "quedarme", "ver cómo me va", "tal vez", "buscar trabajo".</li>
        <li><b>Estrategia con tu mamá:</b> puedes enfocar tu respuesta en el Mundial y no mencionarla por iniciativa propia. Pero si te preguntan directo por familia en EE.UU., <b>di la verdad</b> y recálcalo a tu favor: tu familia respeta las reglas y regresa.</li>
        <li><b>Lleva la carpeta lista:</b> carta de invitación, estados de cuenta, carta laboral y vuelo de ida y vuelta.</li>
        <li><b>Mira a los ojos, habla con calma.</b> Si no entiendes algo, pide que te lo repitan sin pena.</li>
      </ul>
    </div>

    <div class="btn-row">
      <button class="btn gold" onclick="startInterview()">Practicar otra vez (preguntas nuevas) →</button>
      <button class="btn ghost" onclick="goEmbassy()">Cambiar duración</button>
      <button class="btn ghost" onclick="screenIntro()">Inicio</button>
    </div>
  `);
}

/* Atajos de teclado: 1/2/3 para elegir opción, Enter para siguiente */
document.addEventListener("keydown",e=>{
  if(["1","2","3"].includes(e.key) && STATE.mode==="easy" && !STATE.answered){
    const btn=document.querySelector(`.option[data-i="${+e.key-1}"]`);
    if(btn) btn.click();
  }
  if(e.key==="Enter" && STATE.answered){
    const next=document.querySelector("#navArea .btn.gold");
    if(next) next.click();
  }
});

/* Arranque */
screenIntro();
</script>
