<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISA QUEST — La entrevista de Cristina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1020;
    --bg2:#131a31;
    --panel:#16203a;
    --panel2:#1d2a4a;
    --gold:#e7b94e;
    --gold2:#b88a2e;
    --cream:#f4ecd6;
    --green:#5fd07a;
    --green2:#2f8a4c;
    --red:#ff6b5e;
    --red2:#c23a2e;
    --amber:#ffc24d;
    --ink:#0a0f1d;
    --line:#3a4a73;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:'VT323',monospace;
    background:#05070f;
    color:var(--cream);
    display:flex;align-items:center;justify-content:center;
    padding:16px;min-height:100vh;
    image-rendering:pixelated;
  }
  /* CRT scanlines */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.10) 2px 4px);
    mix-blend-mode:multiply;
  }
  #app{width:100%;max-width:760px}

  .screen{
    background:linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);
    border:4px solid var(--gold);
    box-shadow:0 0 0 4px var(--ink), 0 0 0 8px var(--gold2), 0 14px 0 8px rgba(0,0,0,.4);
    padding:26px 24px;position:relative;
  }

  /* Typography */
  .title{font-family:'Press Start 2P',monospace;font-size:18px;line-height:1.5;color:var(--gold);
    text-shadow:3px 3px 0 var(--ink);margin:0 0 14px}
  .title.sm{font-size:13px}
  h2.title{font-size:13px}
  p{font-size:21px;line-height:1.25;margin:10px 0;letter-spacing:.4px}
  .small{font-size:18px;color:#aab6d6;line-height:1.3}
  .tag{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;color:var(--ink);
    background:var(--gold);padding:6px 9px;display:inline-block;margin-bottom:14px;
    box-shadow:3px 3px 0 var(--ink)}
  .gold{color:var(--gold)}
  .hl{color:#fff;background:var(--panel2);padding:0 4px;border-bottom:2px solid var(--gold)}

  /* Buttons */
  .btn{
    font-family:'Press Start 2P',monospace;font-size:11px;line-height:1.4;
    background:var(--panel2);color:var(--cream);border:3px solid var(--cream);
    padding:13px 18px;cursor:pointer;letter-spacing:.5px;
    box-shadow:4px 4px 0 var(--ink);transition:transform .05s, box-shadow .05s;
  }
  .btn:hover{background:#27406e}
  .btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink)}
  .btn.go{background:var(--gold);color:var(--ink);border-color:var(--ink)}
  .btn.go:hover{background:#ffd266}
  .btn.green{background:var(--green2);border-color:#bff5cf;color:#fff}
  .btn.sm{font-size:9px;padding:9px 12px}
  .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;align-items:center}
  .spacer{flex:1}

  /* Mission lines */
  .mission{background:#0a1326;border:3px solid var(--line);padding:14px 16px;margin:14px 0}
  .mline{display:flex;gap:10px;align-items:flex-start;margin:11px 0;font-size:20px;line-height:1.25}
  .mline .ic{font-size:22px;line-height:1;flex-shrink:0}
  .mline b{color:var(--gold)}
  .mline.secret b{color:var(--red)}
  .mline.rule b{color:var(--green)}

  /* Sprites */
  .sprite{display:inline-block;line-height:0;image-rendering:pixelated}
  .sprite svg{display:block;image-rendering:pixelated}

  /* Outfits */
  .outfit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:18px 0}
  .outfit{background:#0a1326;border:3px solid var(--line);padding:14px 10px 12px;text-align:center;cursor:pointer}
  .outfit:hover{border-color:var(--gold)}
  .outfit.sel{border-color:var(--green);background:#0e2417;box-shadow:0 0 0 3px var(--green2) inset}
  .outfit .nm{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--cream);margin:8px 0 4px;line-height:1.4}
  .outfit .hn{font-size:17px;color:#9fb0d6}
  .outfit .sprite{margin:0 auto}

  /* Docs */
  .doc{display:flex;gap:12px;align-items:center;background:#0a1326;border:3px solid var(--line);
    padding:11px 13px;margin:9px 0;cursor:pointer;font-size:20px}
  .doc:hover{border-color:var(--gold)}
  .doc.on{border-color:var(--green);background:#0e2417}
  .doc .bx{width:22px;height:22px;border:3px solid #6b7aa6;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Press Start 2P';font-size:9px}
  .doc.on .bx{background:var(--green2);border-color:#bff5cf}
  .doc b{color:var(--gold)}

  /* Embassy booth */
  .booth{background:#0a1326;border:3px solid var(--line);padding:16px;position:relative;overflow:hidden}
  .booth-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
    font-family:'Press Start 2P';font-size:8px;color:var(--gold);letter-spacing:1px}
  .stage{display:flex;align-items:flex-end;justify-content:center;gap:14px;
    background:linear-gradient(180deg,#26324f 0%,#1a2238 70%,#141a2c 100%);
    border:3px solid #0a1326;padding:14px 10px 0;position:relative;min-height:150px}
  .stage::before{content:"VENTANILLA 7";position:absolute;top:6px;left:50%;transform:translateX(-50%);
    font-family:'Press Start 2P';font-size:7px;color:#cdd8f0;background:#0a1326;padding:4px 8px;border:2px solid var(--line)}
  .counter{position:absolute;left:0;right:0;bottom:0;height:22px;background:#3a2c1c;border-top:3px solid #5a4730}
  .glass{position:absolute;inset:34px 8px 22px 8px;border:2px solid rgba(180,200,255,.25);
    background:rgba(150,190,255,.05);pointer-events:none}
  .glass::after{content:"";position:absolute;top:0;left:18%;width:10%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent)}
  .off-wrap{position:relative;z-index:2}
  .off-name{font-family:'Press Start 2P';font-size:7px;color:#cdd8f0;text-align:center;margin-top:4px}

  /* Trust meter (pixel cells) */
  .trust{margin-top:12px}
  .trust-lbl{display:flex;justify-content:space-between;font-family:'Press Start 2P';font-size:8px;color:#aab6d6;margin-bottom:6px}
  .cells{display:flex;gap:3px}
  .cell{flex:1;height:14px;background:#0a1326;border:2px solid var(--line)}
  .cell.f{border-color:var(--ink)}

  /* Dialogue box */
  .dialog{background:#0a1326;border:3px solid var(--cream);box-shadow:4px 4px 0 var(--ink);
    padding:14px 16px;margin-top:14px;position:relative}
  .dialog .who{font-family:'Press Start 2P';font-size:9px;color:var(--gold);margin-bottom:8px;letter-spacing:.5px}
  .dialog .qtxt{font-size:23px;line-height:1.25;color:#fff}
  .blink{animation:bk 1s steps(1) infinite;color:var(--gold)}
  @keyframes bk{50%{opacity:0}}

  /* Mode toggle */
  .modes{display:flex;gap:8px;margin:14px 0 6px}
  .modes button{flex:1;font-family:'Press Start 2P';font-size:8px;line-height:1.5;padding:10px 6px;
    background:#0a1326;color:#9fb0d6;border:3px solid var(--line);cursor:pointer}
  .modes button.on{background:var(--gold);color:var(--ink);border-color:var(--ink)}

  /* Options menu */
  .opts{display:flex;flex-direction:column;gap:9px;margin:10px 0}
  .opt{display:flex;gap:10px;align-items:flex-start;background:#0a1326;border:3px solid var(--line);
    padding:12px 12px;cursor:pointer;font-size:21px;line-height:1.25;color:var(--cream);text-align:left;font-family:'VT323',monospace}
  .opt:hover:not(:disabled){border-color:var(--gold);background:#10203c}
  .opt .sel{font-family:'Press Start 2P';font-size:10px;color:var(--gold);opacity:0;flex-shrink:0;margin-top:2px}
  .opt:hover:not(:disabled) .sel{opacity:1}
  .opt .k{font-family:'Press Start 2P';font-size:9px;color:#7c8bb5;flex-shrink:0;margin-top:3px}
  .opt:disabled{cursor:default}
  .opt.pick.good{border-color:var(--green);background:#0e2417}
  .opt.pick.mid{border-color:var(--amber);background:#241f0e}
  .opt.pick.bad{border-color:var(--red);background:#240f0e}
  .opt.revealgood{border-color:var(--green)}
  .opt.dim{opacity:.45}

  textarea{width:100%;min-height:96px;background:#0a1326;border:3px solid var(--line);color:var(--cream);
    font-family:'VT323',monospace;font-size:21px;line-height:1.3;padding:12px;resize:vertical}
  textarea:focus{outline:none;border-color:var(--gold)}

  .fb{margin-top:14px;border:3px solid var(--line);background:#0a1326;padding:13px 15px;font-size:20px;line-height:1.3}
  .fb.good{border-color:var(--green);background:#0c1f14}
  .fb.mid{border-color:var(--amber);background:#1f1b0c}
  .fb.bad{border-color:var(--red);background:#1f0e0c}
  .fb .rk{font-family:'Press Start 2P';font-size:8px;letter-spacing:.5px;margin-bottom:7px;display:block}
  .fb.good .rk{color:var(--green)}.fb.mid .rk{color:var(--amber)}.fb.bad .rk{color:var(--red)}
  .fb .react{color:#fff;font-size:22px}
  .model{margin-top:10px;border:2px dashed var(--green2);background:#0c1f14;padding:10px 12px;font-size:19px}
  .model b{color:var(--green)}

  /* Setup form */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .field{margin:11px 0}
  .field label{display:block;font-family:'Press Start 2P';font-size:8px;color:var(--gold);margin-bottom:6px;letter-spacing:.5px;line-height:1.5}
  .field input{width:100%;background:#0a1326;border:3px solid var(--line);color:#fff;
    font-family:'VT323';font-size:20px;padding:9px 11px}
  .field input:focus{outline:none;border-color:var(--gold)}
  .field .ex{font-size:16px;color:#7c8bb5;margin-top:3px}

  /* Result */
  .stamp{font-family:'Press Start 2P';font-size:20px;letter-spacing:2px;padding:14px 18px;display:inline-block;
    border:4px solid;transform:rotate(-4deg);box-shadow:5px 5px 0 var(--ink);margin:10px 0}
  .stamp.app{color:var(--green);border-color:var(--green)}
  .stamp.pen{color:var(--amber);border-color:var(--amber)}
  .stamp.den{color:var(--red);border-color:var(--red)}
  .scorebar{display:flex;gap:10px;margin:16px 0;text-align:center;flex-wrap:wrap}
  .sb{flex:1;min-width:90px;background:#0a1326;border:3px solid var(--line);padding:12px}
  .sb .n{font-family:'Press Start 2P';font-size:18px;display:block;margin-bottom:6px}
  .sb.g .n{color:var(--green)}.sb.m .n{color:var(--amber)}.sb.b .n{color:var(--red)}
  .sb .l{font-size:16px;color:#9fb0d6}
  .cats .cr{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:18px}
  .cats .nm{width:150px;flex-shrink:0;color:var(--gold);font-size:16px}
  .cats .bar{flex:1;height:12px;background:#0a1326;border:2px solid var(--line)}
  .cats .bar span{display:block;height:100%}
  .tips{background:#0a1326;border:3px solid var(--line);padding:15px;margin:14px 0}
  .tips h3{font-family:'Press Start 2P';font-size:10px;color:var(--gold);margin:0 0 12px;line-height:1.5}
  .tips li{font-size:20px;line-height:1.3;margin:9px 0}
  .pill{display:inline-block;font-family:'Press Start 2P';font-size:8px;color:var(--ink);background:#9fb0d6;padding:5px 8px;margin:3px 3px 0 0}

  @media(max-width:560px){
    .title{font-size:14px}.title.sm{font-size:11px}
    p{font-size:19px}.opt{font-size:19px}.dialog .qtxt{font-size:20px}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ================================================================
   PERFIL — caso real de Cristina (editable en el juego)
   ================================================================ */
const PROFILE = {
  nombre:"Cristina", pais:"Panamá", ciudadOrigen:"La Chorrera",
  ocupacion:"la UTP en Panamá Pacífico", tiempoOcup:"",
  visita:"mi mamá", ciudadUS:"Nueva Jersey", duracion:"",
  alojamiento:"", pago:"", vivesCon:"mi abuela y mi tío"
};
const FALLBACK = {
  nombre:"Cristina", pais:"Panamá", ciudadOrigen:"La Chorrera",
  ocupacion:"mi trabajo", tiempoOcup:"varios años",
  visita:"mi mamá", ciudadUS:"Nueva Jersey", duracion:"dos semanas",
  alojamiento:"en casa de una amiga de la familia", pago:"yo, con mis ahorros",
  vivesCon:"mi abuela y mi tío"
};
function val(k){ return (PROFILE[k] && PROFILE[k].trim()) ? PROFILE[k].trim() : FALLBACK[k]; }
function fills(s){ return s.replace(/\{(\w+)\}/g,(_,k)=>val(k)); }

/* ================================================================
   PIXEL SPRITES (SVG de rects, crisp)
   ================================================================ */
function spriteSVG(rects,size,cssw){
  const body=rects.map(r=>`<rect x="${r[0]}" y="${r[1]}" width="${r[2]}" height="${r[3]}" fill="${r[4]}"/>`).join("");
  return `<span class="sprite"><svg width="${cssw}" height="${cssw}" viewBox="0 0 ${size} ${size}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${body}</svg></span>`;
}
/* Cristina (bust 24x24). cMain/cShad = color del outfit */
function cristinaSVG(cMain,cShad,cssw){
  const hair="#5a361f",hairD="#3f2613",skin="#f1cba4",skinS="#e0b78d",eye="#2b1a12",
        mouth="#c2705c",blush="#ec9f8b",collar="#f7f0e2";
  const r=[
    [7,1,10,2,hair],[6,2,12,1,hair],
    [5,3,14,13,hair],[4,5,1,9,hair],[19,5,1,9,hair],
    [7,5,10,11,skin],[7,5,1,11,skinS],[16,5,1,11,skinS],
    [6,4,12,2,hair],[6,6,2,3,hair],[16,6,2,3,hair],
    [9,8,2,1,hairD],[13,8,2,1,hairD],
    [9,9,2,2,eye],[13,9,2,2,eye],[10,9,1,1,"#5a4a44"],[14,9,1,1,"#5a4a44"],
    [12,11,1,1,skinS],
    [8,12,1,1,blush],[15,12,1,1,blush],
    [10,13,4,1,mouth],[9,13,1,1,mouth],[14,13,1,1,mouth],
    [11,16,3,2,skin],
    [4,19,16,5,cMain],[4,19,16,1,cShad],
    [9,18,6,2,collar],[11,19,2,4,collar],
    [7,19,2,5,cShad],[15,19,2,5,cShad]
  ];
  return spriteSVG(r,24,cssw);
}
/* Oficial (bust 24x24) con expresión por mood */
function officerSVG(mood,cssw){
  const hair="#9aa0a6",hairD="#787d84",skin="#e6b48c",skinS="#d29c74",eye="#22303f";
  const navy="#16263f",gold="#cba24c",white="#f2efe6",mouth="#9c5040";
  const base=[
    [7,3,10,2,hair],[6,4,12,1,hair],[6,3,11,1,hairD],
    [5,5,2,7,hair],[17,5,2,7,hair],
    [7,4,10,12,skin],[16,5,1,11,skinS],[7,5,1,11,skinS],
    [6,9,1,2,skin],[17,9,1,2,skin],
    [8,9,2,2,white],[14,9,2,2,white],[9,9,1,2,eye],[14,9,1,2,eye],
    [12,11,1,1,skinS],[12,12,1,1,skinS],
    [9,13,6,1,hair],
    [11,16,3,2,skin],
    [3,18,18,6,navy],[3,18,18,1,"#2a416a"],
    [9,17,6,2,navy],[11,18,2,2,white],[11,19,2,4,"#3a2c1c"],
    [5,20,2,2,gold]
  ];
  let f=[];
  if(mood==="happy") f=[[8,7,3,1,hairD],[13,7,3,1,hairD],[9,15,6,1,mouth],[8,14,1,1,mouth],[15,14,1,1,mouth]];
  else if(mood==="neutral") f=[[8,7,3,1,hairD],[13,7,3,1,hairD],[9,15,6,1,mouth]];
  else if(mood==="doubt") f=[[8,6,3,1,hairD],[13,8,3,1,hairD],[10,15,3,1,mouth]];
  else f=[[8,7,2,1,hairD],[10,8,2,1,hairD],[14,7,2,1,hairD],[12,8,2,1,hairD],[9,15,6,1,mouth],[8,16,1,1,mouth],[15,16,1,1,mouth]]; // angry
  return spriteSVG(base.concat(f),24,cssw);
}

/* ================================================================
   BANCO DE PREGUNTAS (basado en entrevistas B1/B2 reales)
   ================================================================ */
const QUESTIONS = [
{ cat:"proposito", key:true,
  q:"Buenos días. ¿Cuál es el motivo de su viaje a Estados Unidos?",
  keywords:["mundial","fútbol","futbol","turismo","conocer","partidos","vacaciones"],
  options:[
    {text:"Voy como turista al Mundial de fútbol. Me quedo {duracion} y regreso a {pais}.", rating:"good",
     feedback:"Coartada perfecta: turismo claro y TEMPORAL (el Mundial termina y vuelves). No menciones a tu mamá por tu cuenta. OJO: si te preguntan directo por familia, di la verdad."},
    {text:"Voy a visitar a {visita}, que vive en {ciudadUS}.", rating:"bad",
     feedback:"Revelar de entrada que tu mamá vive allá enciende la alarma de inmigración. No mientas, pero tampoco lo ofrezcas tú: lidera con el Mundial."},
    {text:"A ver el Mundial.", rating:"mid",
     feedback:"Buena coartada, pero muy seca. Agrega cuánto tiempo te quedas y que regresas. Y prepárate: lo siguiente será '¿tienes entradas?'."}
  ]},
{ cat:"proposito", key:true,
  q:"El Mundial, ¿eh? ¿A qué partidos o ciudades piensa ir?",
  keywords:["partido","partidos","entradas","boletos","estadio","ciudad","tengo"],
  options:[
    {text:"Tengo entradas para [partido/ciudad]; aquí está la confirmación.", rating:"good",
     feedback:"Entradas concretas + confirmación a la mano = tu coartada es real y verificable. Esto sostiene toda tu historia."},
    {text:"A los que pueda, todavía no compro nada.", rating:"bad",
     feedback:"Sin entradas, el 'Mundial' suena a pretexto y el oficial lo nota al instante. Compra las entradas ANTES de la cita."},
    {text:"Todavía estoy viendo disponibilidad.", rating:"mid",
     feedback:"Si el Mundial es tu razón principal, ten los partidos/ciudades definidos y lleva el comprobante."}
  ]},
{ cat:"proposito",
  q:"¿Ya compró las entradas para los partidos?",
  keywords:["sí","si","compré","compre","entradas","confirmación"],
  options:[
    {text:"Sí, ya las compré, tengo la confirmación impresa.", rating:"good",
     feedback:"Prueba sólida de que el viaje es real y con propósito turístico claro."},
    {text:"No, las compro cuando llegue allá.", rating:"bad",
     feedback:"Comprar todo al llegar debilita tu coartada. Llévalas listas como respaldo."},
    {text:"Estoy en proceso de comprarlas.", rating:"mid",
     feedback:"Mejor tenerlas listas. Si no, lleva el comprobante del intento o la reserva."}
  ]},
{ cat:"tiempo", key:true,
  q:"¿Cuánto tiempo piensa quedarse?",
  keywords:["semanas","días","dias","dos","tres","duracion","regreso"],
  options:[
    {text:"{duracion}. Mi vuelo de regreso ya está reservado.", rating:"good",
     feedback:"Estancia corta y específica + vuelo de vuelta = señal fuerte de retorno."},
    {text:"No sé, depende de cómo me sienta allá.", rating:"bad",
     feedback:"Estancia indefinida = posible inmigrante. Siempre da un periodo corto y concreto."},
    {text:"Como un mes, más o menos.", rating:"mid",
     feedback:"Impreciso. Da fechas exactas y menciona que el vuelo de vuelta ya está comprado."}
  ]},
{ cat:"tiempo",
  q:"¿Tiene boleto de regreso?",
  keywords:["sí","si","vuelo","boleto","regreso","reservado","ida y vuelta"],
  options:[
    {text:"Sí, compré ida y vuelta. Regreso al terminar {duracion}.", rating:"good",
     feedback:"El boleto de vuelta es de las pruebas más fuertes de que regresas."},
    {text:"Solo compré la ida por ahora.", rating:"bad",
     feedback:"Comprar solo la ida es una bandera roja clásica. Compra ida y vuelta antes de la entrevista."},
    {text:"Lo compro cuando me den la visa.", rating:"mid",
     feedback:"Entendible por costo, pero ten un itinerario con fecha de regreso clara para mencionar."}
  ]},
{ cat:"alojamiento", key:true,
  q:"¿Dónde se va a quedar?",
  keywords:["casa","amiga","hotel","dirección","direccion","quedo"],
  options:[
    {text:"{alojamiento}, tengo la dirección y carta de invitación.", rating:"good",
     feedback:"Lugar específico, relación clara y documentos listos. Excelente."},
    {text:"En casa de {visita}.", rating:"mid",
     feedback:"Si tu coartada es el Mundial, decir que te quedas en casa de tu mamá conecta los puntos hacia 'inmigración'. Si de verdad te quedas con ella, dilo con calma pero refuerza que regresas."},
    {text:"Todavía no lo decidimos bien.", rating:"bad",
     feedback:"Sin lugar definido = sospechoso. Debes saber exactamente dónde vas a dormir."}
  ]},
{ cat:"alojamiento",
  q:"¿Me da la dirección donde se hospedará?",
  keywords:["dirección","direccion","calle","ciudad","tengo","apunté"],
  options:[
    {text:"Sí, la tengo apuntada aquí, se la muestro.", rating:"good",

const REACT = {
  good:["Entiendo.","Muy bien.","De acuerdo.","Perfecto.","Anotado."],
  mid:["Mmm... está bien.","Vale.","Ya veo.","Continuemos."],
  bad:["¿En serio?","Eso no me convence.","No me cuadra.","Sea más específica.","Hmm."]
};
function faceFor(c){
  if(c>=75) return {mood:"happy", label:"El oficial asiente, convencido."};
  if(c>=55) return {mood:"neutral", label:"El oficial mantiene cara neutral."};
  if(c>=35) return {mood:"doubt", label:"El oficial te mira con duda."};
  return {mood:"angry", label:"El oficial frunce el ceño."};
}
function trustColor(c){ return c>=70?"var(--green)":c>=45?"var(--amber)":"var(--red)"; }

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function applyRating(r){
  STATE.score[r]++;
  if(r==="good") STATE.confidence=Math.min(100,STATE.confidence+13);
  else if(r==="bad") STATE.confidence=Math.max(0,STATE.confidence-16);
  else STATE.confidence=Math.max(0,STATE.confidence-1);
}
function recordCat(c,r){
  if(!STATE.catScore[c]) STATE.catScore[c]={good:0,total:0};
  STATE.catScore[c].total++;
  if(r==="good") STATE.catScore[c].good++; else if(r==="mid") STATE.catScore[c].good+=.5;
}

function setLen(n,b){STATE.length=n;document.querySelectorAll(".modes button").forEach(x=>x.classList.remove("on"));b.classList.add("on");}

function buildInterview(n){
  const keys=QUESTIONS.filter(q=>q.key);
  const rest=shuffle(QUESTIONS.filter(q=>!q.key));
  let sel=shuffle(keys).slice(0,Math.min(keys.length,Math.ceil(n*0.6)));
  for(const q of rest){if(sel.length>=n)break;sel.push(q);}
  sel=sel.slice(0,n);
  const order={proposito:1,tiempo:2,alojamiento:3,familia:4,finanzas:5,lazos:6,historial:7,trampa:8};
  return shuffle(sel).sort((a,b)=>(order[a.cat]||5)-(order[b.cat]||5));
}
function startInterview(){
  STATE.questions=buildInterview(STATE.length);
  STATE.current=0;STATE.confidence=55;STATE.score={good:0,mid:0,bad:0};STATE.catScore={};
  renderQuestion();
}

function trustCells(c){
  const f=Math.round(c/10);let s="";
  for(let i=0;i<10;i++) s+=`<div class="cell${i<f?" f":""}" style="${i<f?`background:${trustColor(c)}`:""}"></div>`;
  return s;
}

    </div>

    <div class="modes">
      <button class="${STATE.mode==='easy'?'on':''}" onclick="setMode('easy',this)">FÁCIL · ELEGIR</button>
      <button class="${STATE.mode==='hard'?'on':''}" onclick="setMode('hard',this)">DIFÍCIL · ESCRIBIR</button>
    </div>

    <div id="ans"></div>
    <div id="fb"></div>
    <div class="row" id="nav"><button class="btn sm" onclick="confirmQuit()">SALIR</button></div>
  `);
  if(STATE.mode==="easy") renderEasy(); else renderHard();
}
function setMode(m,b){
  STATE.mode=m;document.querySelectorAll(".modes button").forEach(x=>x.classList.remove("on"));b.classList.add("on");
  if(STATE.answered)return;
  if(m==="easy")renderEasy();else renderHard();
}
function renderEasy(){
  const q=STATE.questions[STATE.current];
  const opts=shuffle(q.options);
  const a=document.getElementById("ans");
  a.innerHTML=`<div class="opts">${opts.map((o,i)=>
    `<button class="opt" data-i="${i}" onclick="pickOption(${i})"><span class="sel">▶</span><span class="k">${i+1}</span><span>${fills(o.text)}</span></button>`).join("")}</div>`;
  a.dataset.opts=JSON.stringify(opts);
  document.getElementById("fb").innerHTML="";
}
function renderHard(){
  document.getElementById("ans").innerHTML=`
    <textarea id="fa" placeholder="Escribe lo que responderías... corto y específico."></textarea>
    <div class="row"><button class="btn green sm" onclick="submitFree()">RESPONDER</button></div>`;
  document.getElementById("fb").innerHTML="";
}
function updateOfficer(){
  const f=faceFor(STATE.confidence);
  const s=document.getElementById("offSprite"),m=document.getElementById("offMood"),
        c=document.getElementById("cCells"),p=document.getElementById("cPct");
  if(s)s.innerHTML=officerSVG(f.mood,116);
  if(m)m.textContent=f.label;
  if(c)c.innerHTML=trustCells(STATE.confidence);
  if(p)p.textContent=STATE.confidence+"%";
}
function pickOption(i){
  if(STATE.answered)return;STATE.answered=true;
  const q=STATE.questions[STATE.current];
  const opts=JSON.parse(document.getElementById("ans").dataset.opts);
  const ch=opts[i];
  applyRating(ch.rating);recordCat(q.cat,ch.rating);updateOfficer();
  const gi=opts.findIndex(o=>o.rating==="good");
  document.querySelectorAll(".opt").forEach((b,idx)=>{
    b.disabled=true;
    if(idx===i)b.classList.add("pick",ch.rating);
    else if(idx===gi&&ch.rating!=="good")b.classList.add("revealgood");
    else b.classList.add("dim");
  });
  let extra="";
  if(ch.rating!=="good"&&gi>=0) extra=`<div class="model"><b>✓ La más fuerte era:</b> "${fills(opts[gi].text)}"</div>`;
  showFB(ch.rating,pick(REACT[ch.rating]),ch.feedback,extra);
  showNext();
}
function submitFree(){
  if(STATE.answered)return;
  const t=document.getElementById("fa").value.trim();
  if(t.length<3){alert("Escribe algo primero.");return;}
  STATE.answered=true;
  const q=STATE.questions[STATE.current];
  const r=evalFree(t,q);
  applyRating(r);recordCat(q.cat,r);updateOfficer();
  document.getElementById("fa").disabled=true;
  const good=q.options.find(o=>o.rating==="good");
  const extra=good?`<div class="model"><b>💡 Respuesta modelo:</b> "${fills(good.text)}"</div>`:"";
  showFB(r,pick(REACT[r]),freeTip(r),extra);
  showNext();
}
function evalFree(text,q){
  const t=" "+text.toLowerCase()+" ";
  const w=text.trim().split(/\s+/).length;
  const hits=(q.keywords||[]).filter(k=>t.includes(k)).length;
  const red=["oportunidad","quedarme","mejor vida","trabajar all","buscar trabajo","tal vez","quizá","quiza","ver cómo me va","ver como me va","no sé si","no se si"];
  if(red.filter(r=>t.includes(r)).length>=1)return "bad";
  if(w<4)return "mid";
  if(hits>=2&&w>=6&&w<=70)return "good";
  if(hits>=1)return "mid";
  return "mid";
}
function freeTip(r){
  if(r==="good")return "Buena respuesta: tocaste los puntos clave sin extenderte. Compárala con la modelo.";
  if(r==="bad")return "Cuidado: usaste palabras que encienden alarmas ('oportunidad', 'quedarme', 'tal vez') o sonaste indecisa. Reformula hacia 'voy de visita y regreso'. Mira la modelo.";
  return "Aceptable pero mejorable: sé más concreta (fechas, lugares) y deja claro que regresas. Fíjate en la modelo.";
}
function showFB(r,react,exp,extra=""){
  document.getElementById("fb").innerHTML=`<div class="fb ${r}"><span class="rk">REACCIÓN DEL OFICIAL</span>
    <div class="react">"${react}"</div><div style="margin-top:8px">${exp}</div>${extra}</div>`;
}
function showNext(){
  const last=STATE.current===STATE.questions.length-1;
  document.getElementById("nav").innerHTML=`<button class="btn sm" onclick="confirmQuit()">SALIR</button>
    <div class="spacer"></div><button class="btn go sm" onclick="nextQuestion()">${last?"VEREDICTO ▶":"SIGUIENTE ▶"}</button>`;
}
function nextQuestion(){if(STATE.current<STATE.questions.length-1){STATE.current++;renderQuestion();}else screenResult();}
function confirmQuit(){if(confirm("¿Salir? Perderás el progreso."))screenIntro();}

function screenResult(){
  const {good,mid,bad}=STATE.score,conf=STATE.confidence;
  let stamp,cls,title,msg;
  if(conf>=70&&bad<=1){stamp="VISA APROBADA";cls="app";
    title="\"Su visa fue aprobada. Buen viaje.\"";
    msg="¡Lo lograste, "+val("nombre")+"! Mantuviste la coartada del Mundial, mostraste lazos fuertes con Panamá y no caíste en banderas rojas. Esa es la actitud.";}
  else if(conf<40||bad>=4){stamp="VISA NEGADA";cls="den";
    title="\"Lo siento, no califica.\" (formulario 214(b))";
    msg="Varias respuestas no convencieron al oficial. Es práctica: repasa lo marcado en rojo, enfócate en que REGRESAS, e inténtalo otra vez.";}
  else{stamp="EN REVISIÓN";cls="pen";
    title="\"Su caso necesita revisión adicional.\"";
    msg="Estuviste cerca, pero algunas respuestas dejaron dudas. Afina lo amarillo/rojo y prueba de nuevo. Vas por buen camino.";}
  let cats="";
  for(const c in STATE.catScore){
    const x=STATE.catScore[c],p=Math.round(x.good/x.total*100);
    const col=p>=70?"var(--green)":p>=40?"var(--amber)":"var(--red)";
    cats+=`<div class="cr"><span class="nm">${CAT_LABELS[c]||c}</span><div class="bar"><span style="width:${p}%;background:${col}"></span></div><span style="width:36px;text-align:right;color:#9fb0d6">${p}%</span></div>`;
  }
  const [cm,cs]=outfitColors();
  render(`
    <span class="tag">VEREDICTO</span>
    <div style="text-align:center">${cristinaSVG(cm,cs,90)}<br><span class="stamp ${cls}">${stamp}</span></div>
    <p class="small" style="text-align:center">${title}</p>
    <p>${msg}</p>
    <div class="scorebar">
      <div class="sb g"><span class="n">${good}</span><span class="l">EXCELENTES</span></div>
      <div class="sb m"><span class="n">${mid}</span><span class="l">REGULARES</span></div>
      <div class="sb b"><span class="n">${bad}</span><span class="l">FLOJAS</span></div>
    </div>
    <h2 class="title sm">Desempeño por tema</h2>
    <div class="cats">${cats}</div>
    <div class="tips">
      <h3>★ REGLAS DE ORO</h3>
      <ul>
        <li>Respuestas <b>cortas y directas</b>. Responde solo lo que te preguntan.</li>
        <li>Demuestra que <b>vas a volver</b>: trabajo (UTP), familia, carro. Varios lazos, no uno.</li>
        <li><b>Nunca mientas.</b> Todo está en su sistema y debe coincidir con tu DS-160.</li>
        <li>La <b>coartada del Mundial</b> solo sirve si es real: lleva tus entradas.</li>
        <li>Con tu <b>mamá</b>: no la menciones tú; pero si te preguntan, di la verdad y reafirma que regresas.</li>
        <li>Evita: "oportunidades", "quedarme", "ver cómo me va", "tal vez".</li>
      </ul>
    </div>
    <div class="row">
      <button class="btn green sm" onclick="startInterview()">JUGAR OTRA VEZ ▶</button>
      <button class="btn sm" onclick="goEmbassy()">CAMBIAR LARGO</button>
      <button class="btn sm" onclick="screenIntro()">INICIO</button>
    </div>
  `);
}

document.addEventListener("keydown",e=>{
  if(["1","2","3"].includes(e.key)&&STATE.mode==="easy"&&!STATE.answered){
    const b=document.querySelector(`.opt[data-i="${+e.key-1}"]`);if(b)b.click();
  }
  if(e.key==="Enter"&&STATE.answered){const n=document.querySelector("#nav .btn.go");if(n)n.click();}
});

screenIntro();
</script>
</body>
</html>
