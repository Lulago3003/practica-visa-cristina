<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Visa Quest">
<title>VISA QUEST — La entrevista de Cristina</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1020;--bg2:#131a31;--panel:#16203a;--panel2:#1d2a4a;
    --gold:#e7b94e;--gold2:#b88a2e;--cream:#f4ecd6;
    --green:#5fd07a;--green2:#2f8a4c;--red:#ff6b5e;--red2:#c23a2e;--amber:#ffc24d;
    --ink:#0a0f1d;--line:#3a4a73;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:#05070f;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  html,body{margin:0;padding:0}
  body{
    font-family:'VT323',monospace;background:#05070f;color:var(--cream);display:flex;
    padding:16px;
    padding-top:max(16px,env(safe-area-inset-top));
    padding-bottom:max(16px,env(safe-area-inset-bottom));
    padding-left:max(16px,env(safe-area-inset-left));
    padding-right:max(16px,env(safe-area-inset-right));
    min-height:100vh;min-height:100dvh;image-rendering:pixelated;overflow-x:hidden;
  }
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background:repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.10) 2px 4px);mix-blend-mode:multiply}
  #app{width:100%;max-width:760px;margin:auto}

  .screen{background:linear-gradient(180deg,var(--bg) 0%, var(--bg2) 100%);border:4px solid var(--gold);
    box-shadow:0 0 0 4px var(--ink), 0 0 0 8px var(--gold2), 0 14px 0 8px rgba(0,0,0,.4);padding:26px 24px;position:relative}

  .title{font-family:'Press Start 2P',monospace;font-size:18px;line-height:1.5;color:var(--gold);text-shadow:3px 3px 0 var(--ink);margin:0 0 14px}
  .title.sm{font-size:13px}
  h2.title{font-size:13px}
  p{font-size:21px;line-height:1.25;margin:10px 0;letter-spacing:.4px}
  .small{font-size:18px;color:#aab6d6;line-height:1.3}
  .tag{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;color:var(--ink);background:var(--gold);padding:6px 9px;display:inline-block;margin-bottom:14px;box-shadow:3px 3px 0 var(--ink)}
  .gold{color:var(--gold)}

  .btn{font-family:'Press Start 2P',monospace;font-size:11px;line-height:1.4;background:var(--panel2);color:var(--cream);border:3px solid var(--cream);padding:13px 18px;cursor:pointer;letter-spacing:.5px;box-shadow:4px 4px 0 var(--ink);transition:transform .05s, box-shadow .05s}
  .btn:hover{background:#27406e}
  .btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink)}
  .btn.go{background:var(--gold);color:var(--ink);border-color:var(--ink)}
  .btn.go:hover{background:#ffd266}
  .btn.green{background:var(--green2);border-color:#bff5cf;color:#fff}
  .btn.sm{font-size:9px;padding:9px 12px}
  .row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;align-items:center}
  .spacer{flex:1}

  .mission{background:#0a1326;border:3px solid var(--line);padding:14px 16px;margin:14px 0}
  .mline{display:flex;gap:10px;align-items:flex-start;margin:11px 0;font-size:20px;line-height:1.25}
  .mline .ic{font-size:22px;line-height:1;flex-shrink:0}
  .mline b{color:var(--gold)}
  .mline.secret b{color:var(--red)}
  .mline.rule b{color:var(--green)}

  .sprite{display:inline-block;line-height:0;image-rendering:pixelated}
  .sprite svg{display:block;image-rendering:pixelated}

  .outfit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:18px 0}
  .outfit{background:#0a1326;border:3px solid var(--line);padding:14px 10px 12px;text-align:center;cursor:pointer}
  .outfit:hover{border-color:var(--gold)}
  .outfit.sel{border-color:var(--green);background:#0e2417;box-shadow:0 0 0 3px var(--green2) inset}
  .outfit .nm{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--cream);margin:8px 0 4px;line-height:1.4}
  .outfit .hn{font-size:17px;color:#9fb0d6}
  .outfit .sprite{margin:0 auto}

  .lip-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:10px 0}
  .lip{background:#0a1326;border:3px solid var(--line);padding:12px 8px;text-align:center;cursor:pointer}
  .lip:hover{border-color:var(--gold)}
  .lip.sel{border-color:var(--green);background:#0e2417;box-shadow:0 0 0 3px var(--green2) inset}
  .lip .sw{width:34px;height:34px;border-radius:50%;margin:0 auto 7px;border:3px solid #0a1326;box-shadow:0 0 0 2px var(--line)}
  .lip .nm{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--cream);line-height:1.4}

  .doc{display:flex;gap:12px;align-items:center;background:#0a1326;border:3px solid var(--line);padding:11px 13px;margin:9px 0;cursor:pointer;font-size:20px}
  .doc:hover{border-color:var(--gold)}
  .doc.on{border-color:var(--green);background:#0e2417}
  .doc .bx{width:22px;height:22px;border:3px solid #6b7aa6;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Press Start 2P';font-size:9px}
  .doc.on .bx{background:var(--green2);border-color:#bff5cf}
  .doc b{color:var(--gold)}

  .booth{background:#0a1326;border:3px solid var(--line);padding:16px;position:relative;overflow:hidden}
  .booth-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-family:'Press Start 2P';font-size:8px;color:var(--gold);letter-spacing:1px}
  .stage{display:flex;align-items:flex-end;justify-content:center;gap:14px;background:linear-gradient(180deg,#26324f 0%,#1a2238 70%,#141a2c 100%);border:3px solid #0a1326;padding:14px 10px 0;position:relative;min-height:150px}
  .stage::before{content:"VENTANILLA 7";position:absolute;top:6px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P';font-size:7px;color:#cdd8f0;background:#0a1326;padding:4px 8px;border:2px solid var(--line)}
  .counter{position:absolute;left:0;right:0;bottom:0;height:22px;background:#3a2c1c;border-top:3px solid #5a4730}
  .glass{position:absolute;inset:34px 8px 22px 8px;border:2px solid rgba(180,200,255,.25);background:rgba(150,190,255,.05);pointer-events:none}
  .glass::after{content:"";position:absolute;top:0;left:18%;width:10%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent)}
  .off-wrap{position:relative;z-index:2}
  .off-name{font-family:'Press Start 2P';font-size:7px;color:#cdd8f0;text-align:center;margin-top:4px}

  .trust{margin-top:12px}
  .trust-lbl{display:flex;justify-content:space-between;font-family:'Press Start 2P';font-size:8px;color:#aab6d6;margin-bottom:6px}
  .cells{display:flex;gap:3px}
  .cell{flex:1;height:14px;background:#0a1326;border:2px solid var(--line)}
  .cell.f{border-color:var(--ink)}

  .dialog{background:#0a1326;border:3px solid var(--cream);box-shadow:4px 4px 0 var(--ink);padding:14px 16px;margin-top:14px;position:relative}
  .dialog .who{font-family:'Press Start 2P';font-size:9px;color:var(--gold);margin-bottom:8px;letter-spacing:.5px}
  .dialog .qtxt{font-size:23px;line-height:1.25;color:#fff}
  .blink{animation:bk 1s steps(1) infinite;color:var(--gold)}
  @keyframes bk{50%{opacity:0}}

  .hint{font-size:17px;color:#7c8bb5;margin:10px 0 6px}
  textarea{width:100%;min-height:92px;background:#0a1326;border:3px solid var(--line);color:var(--cream);font-family:'VT323',monospace;font-size:21px;line-height:1.3;padding:12px;resize:vertical;-webkit-appearance:none;appearance:none;border-radius:0}
  textarea:focus{outline:none;border-color:var(--gold)}

  .fb{margin-top:14px;border:3px solid var(--line);background:#0a1326;padding:13px 15px;font-size:20px;line-height:1.3}
  .fb.good{border-color:var(--green);background:#0c1f14}
  .fb.mid{border-color:var(--amber);background:#1f1b0c}
  .fb.bad{border-color:var(--red);background:#1f0e0c}
  .fb .rk{font-family:'Press Start 2P';font-size:8px;letter-spacing:.5px;margin-bottom:7px;display:block}
  .fb.good .rk{color:var(--green)}.fb.mid .rk{color:var(--amber)}.fb.bad .rk{color:var(--red)}
  .fb .react{color:#fff;font-size:22px}
  .coach{margin-top:8px}
  .model{margin-top:10px;border:2px dashed var(--green2);background:#0c1f14;padding:10px 12px;font-size:19px}
  .model b{color:var(--green)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .field{margin:11px 0}
  .field label{display:block;font-family:'Press Start 2P';font-size:8px;color:var(--gold);margin-bottom:6px;letter-spacing:.5px;line-height:1.5}
  .field input{width:100%;background:#0a1326;border:3px solid var(--line);color:#fff;font-family:'VT323';font-size:20px;padding:9px 11px;-webkit-appearance:none;appearance:none;border-radius:0}
  .field input:focus{outline:none;border-color:var(--gold)}
  .field .ex{font-size:16px;color:#7c8bb5;margin-top:3px}

  .modes{display:flex;gap:8px;margin:6px 0}
  .modes button{flex:1;font-family:'Press Start 2P';font-size:8px;line-height:1.5;padding:10px 6px;background:#0a1326;color:#9fb0d6;border:3px solid var(--line);cursor:pointer}
  .modes button.on{background:var(--gold);color:var(--ink);border-color:var(--ink)}

  .stamp{font-family:'Press Start 2P';font-size:20px;letter-spacing:2px;padding:14px 18px;display:inline-block;border:4px solid;transform:rotate(-4deg);box-shadow:5px 5px 0 var(--ink);margin:10px 0}
  .stamp.app{color:var(--green);border-color:var(--green)}
  .stamp.pen{color:var(--amber);border-color:var(--amber)}
  .stamp.den{color:var(--red);border-color:var(--red)}
  .scorebar{display:flex;gap:10px;margin:16px 0;text-align:center;flex-wrap:wrap}
  .sb{flex:1;min-width:90px;background:#0a1326;border:3px solid var(--line);padding:12px}
  .sb .n{font-family:'Press Start 2P';font-size:18px;display:block;margin-bottom:6px}
  .sb.g .n{color:var(--green)}.sb.m .n{color:var(--amber)}.sb.b .n{color:var(--red)}
  .sb .l{font-size:16px;color:#9fb0d6}
  .cats .cr{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:18px}
  .cats .nm{width:150px;flex-shrink:0;color:var(--gold);font-size:16px}
  .cats .bar{flex:1;height:12px;background:#0a1326;border:2px solid var(--line)}
  .cats .bar span{display:block;height:100%}
  .tips{background:#0a1326;border:3px solid var(--line);padding:15px;margin:14px 0}
  .tips h3{font-family:'Press Start 2P';font-size:10px;color:var(--gold);margin:0 0 12px;line-height:1.5}
  .tips li{font-size:20px;line-height:1.3;margin:9px 0}

  .title,.btn,.tag,.dialog .who,.fb .rk,.tips h3,.field label,.modes button,.off-name,.outfit .nm,.stamp,.sb .n{overflow-wrap:anywhere;max-width:100%}

  @media(max-width:560px){
    .title{font-size:14px}.title.sm{font-size:11px}
    p{font-size:19px}.dialog .qtxt{font-size:20px}
  }
  @media(max-width:400px){
    .screen{padding:18px 14px}
    .title{font-size:12px}.title.sm{font-size:10px}
    .tag{font-size:8px;padding:5px 7px}
    .btn{font-size:10px;padding:12px 11px}
    .btn.sm{font-size:8px;padding:10px 9px}
    .modes button{font-size:7px;padding:9px 4px}
    .mline{font-size:18px}.mline .ic{font-size:19px}
    .dialog .qtxt{font-size:19px}
    .stamp{font-size:16px;letter-spacing:1px}
    .cats .nm{width:120px;font-size:14px}
    .row{gap:9px}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ================================================================
   PERFIL — caso real de Cristina (editable en el juego)
   ================================================================ */
const PROFILE = {
  nombre:"Cristina", pais:"Panamá", ciudadOrigen:"La Chorrera",
  ocupacion:"la UTP en Panamá Pacífico", tiempoOcup:"",
  visita:"mi mamá", ciudadUS:"Nueva Jersey", duracion:"",
  alojamiento:"en casa de la pareja de mi mamá", pago:"", vivesCon:"mi abuela y mi tío"
};
const FALLBACK = {
  nombre:"Cristina", pais:"Panamá", ciudadOrigen:"La Chorrera",
  ocupacion:"mi trabajo", tiempoOcup:"varios años",
  visita:"mi mamá", ciudadUS:"Nueva Jersey", duracion:"dos semanas",
  alojamiento:"en casa de la pareja de mi mamá", pago:"yo, con mis ahorros",
  vivesCon:"mi abuela y mi tío"
};
function val(k){ return (PROFILE[k] && PROFILE[k].trim()) ? PROFILE[k].trim() : FALLBACK[k]; }
function fills(s){ return s.replace(/\{(\w+)\}/g,(_,k)=>val(k)); }

/* ================================================================
   PIXEL SPRITES
   ================================================================ */
function spriteSVG(rects,size,cssw){
  const body=rects.map(r=>`<rect x="${r[0]}" y="${r[1]}" width="${r[2]}" height="${r[3]}" fill="${r[4]}"/>`).join("");
  return `<span class="sprite"><svg width="${cssw}" height="${cssw}" viewBox="0 0 ${size} ${size}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">${body}</svg></span>`;
}
/* Cristina (piel negra). cMain/cShad = color del outfit */
function cristinaSVG(cMain,cShad,lip,cssw){
  const hair="#17120d",hairD="#2c2018",skin="#f1cba4",skinS="#e0b78d",eye="#2b1a12",
        blush="#ec9f8b",collar="#f7f0e2";
  const r=[
    [7,1,10,2,hair],[6,2,12,1,hair],
    [5,3,14,13,hair],[4,5,1,9,hair],[19,5,1,9,hair],
    [7,5,10,11,skin],[7,5,1,11,skinS],[16,5,1,11,skinS],
    [6,4,12,2,hair],[6,6,2,3,hair],[16,6,2,3,hair],
    [9,8,2,1,hairD],[13,8,2,1,hairD],
    [9,9,2,2,eye],[13,9,2,2,eye],[10,9,1,1,"#ffffff"],[14,9,1,1,"#ffffff"],
    [12,11,1,1,skinS],
    [8,12,1,1,blush],[15,12,1,1,blush],
    [10,13,4,1,lip],[9,13,1,1,lip],[14,13,1,1,lip],
    [11,16,3,2,skin],
    [4,19,16,5,cMain],[4,19,16,1,cShad],
    [9,18,6,2,collar],[11,19,2,4,collar],
    [7,19,2,5,cShad],[15,19,2,5,cShad]
  ];
  return spriteSVG(r,24,cssw);
}
/* Oficial con expresión por mood */
function officerSVG(mood,cssw){
  const hair="#9aa0a6",hairD="#787d84",skin="#e6b48c",skinS="#d29c74",eye="#22303f";
  const navy="#16263f",gold="#cba24c",white="#f2efe6",mouth="#9c5040";
  const base=[
    [7,3,10,2,hair],[6,4,12,1,hair],[6,3,11,1,hairD],
    [5,5,2,7,hair],[17,5,2,7,hair],
    [7,4,10,12,skin],[16,5,1,11,skinS],[7,5,1,11,skinS],
    [6,9,1,2,skin],[17,9,1,2,skin],
    [8,9,2,2,white],[14,9,2,2,white],[9,9,1,2,eye],[14,9,1,2,eye],
    [12,11,1,1,skinS],[12,12,1,1,skinS],
    [9,13,6,1,hair],
    [11,16,3,2,skin],
    [3,18,18,6,navy],[3,18,18,1,"#2a416a"],
    [9,17,6,2,navy],[11,18,2,2,white],[11,19,2,4,"#3a2c1c"],
    [5,20,2,2,gold]
  ];
  let f=[];
  if(mood==="happy") f=[[8,7,3,1,hairD],[13,7,3,1,hairD],[9,15,6,1,mouth],[8,14,1,1,mouth],[15,14,1,1,mouth]];
  else if(mood==="neutral") f=[[8,7,3,1,hairD],[13,7,3,1,hairD],[9,15,6,1,mouth]];
  else if(mood==="doubt") f=[[8,6,3,1,hairD],[13,8,3,1,hairD],[10,15,3,1,mouth]];
  else f=[[8,7,2,1,hairD],[10,8,2,1,hairD],[14,7,2,1,hairD],[12,8,2,1,hairD],[9,15,6,1,mouth],[8,16,1,1,mouth],[15,16,1,1,mouth]];
  return spriteSVG(base.concat(f),24,cssw);
}

/* ================================================================
   BANCO DE PREGUNTAS — respuesta libre.
   want = ideas que una buena respuesta toca | avoid = banderas rojas
   must = la respuesta DEBE incluir alguna de estas | model = respuesta ideal
   coach = qué hace fuerte tu respuesta y qué evitar (para ESTA pregunta)
   ================================================================ */
const QUESTIONS = [
{ cat:"proposito", key:true,
  q:"Buenos días. ¿Cuál es el motivo de su viaje a Estados Unidos?",
  want:["mundial","fútbol","futbol","turismo","turista","partido","vacacion","conocer","regres","vuelv","semana"],
  avoid:["buscar oportunidad","mejor vida","ver como me va","ver cómo me va","conseguir trabajo","buscar trabajo","mi mamá vive","mi mama vive"],
  model:"Voy como turista al Mundial de fútbol. Me quedo {duracion} y regreso a {pais}.",
  coach:"Lidera con el Mundial: es un turismo claro y temporal (termina y regresas). No menciones a tu mamá por iniciativa propia. Nunca uses palabras de 'oportunidad' o trabajo." },

{ cat:"proposito", key:true,
  q:"El Mundial... ¿a qué partidos piensa ir y ya tiene las entradas?",
  want:["partido","entrada","entradas","boleto","compré","compre","confirmación","confirmacion","estadio","ciudad","tengo"],
  avoid:["no he comprado","cuando llegue","allá las compro","alla las compro","a los que pueda","todavía no","todavia no"],
  model:"Tengo entradas para [partido] en [ciudad]; ya las compré y traigo la confirmación.",
  coach:"Sé concreta: nombra partidos o ciudad y di que YA tienes las entradas. Si el Mundial es tu motivo, tienes que poder sostenerlo con detalles y comprobantes reales." },

{ cat:"tiempo", key:true,
  q:"¿Cuánto tiempo se va a quedar y cuándo regresa?",
  want:["semana","semanas","días","dias","regreso","vuelvo","vuelo","reservado"],
  avoid:["no sé","no se","depende","indefinido","el tiempo que","ver cuánto","ver cuanto"],
  model:"{duracion}. Tengo el vuelo de regreso ya reservado.",
  coach:"Da un periodo corto y exacto y menciona tu vuelo de regreso. Nada de 'depende' ni estancias abiertas: eso sugiere que te quieres quedar." },

{ cat:"alojamiento", key:true,
  q:"¿Dónde se va a hospedar?",
  want:["casa","dirección","direccion","invitación","invitacion","tengo la dirección","nueva jersey"],
  avoid:["no sé","no se","todavía no","todavia no","conocí por internet","conoci por internet","un hotel cualquiera"],
  model:"{alojamiento}, en {ciudadUS}. Tengo la dirección y la carta de invitación.",
  coach:"Ten la dirección y la carta de invitación listas, y dilo con seguridad. Saber exactamente dónde dormirás transmite que el viaje es real y organizado." },

{ cat:"alojamiento", key:true, tricky:true,
  q:"¿Y quién es esa persona con la que se va a quedar?",
  want:["pareja","mamá","mama","invitada","unos días","unos dias","regreso","conozco","temporal"],
  avoid:["prefiero no","no quiero decir","no le importa","no es asunto"],
  model:"Es la pareja de mi mamá. Me reciben unos días como invitada y luego regreso a {pais}.",
  coach:"Aquí toca la verdad. Dilo con naturalidad y, de inmediato, reafirma que es solo por unos días y que regresas. No lo evadas ni lo disfraces: si lo descubren, parecerá que ocultabas algo." },

{ cat:"familia", key:true, tricky:true,
  q:"¿Tiene familiares viviendo en Estados Unidos?",
  want:["sí","si","mamá","mama","nueva jersey","mi vida","panamá","panama","regreso","de visita"],
  avoid:["no tengo familia","a nadie","ningún familiar","ningun familiar","nadie allá","nadie alla","no tengo a nadie"],
  model:"Sí, mi mamá vive en {ciudadUS}. Pero mi vida está en {pais} y voy solo de visita por el Mundial.",
  coach:"Te preguntan directo: la verdad SIEMPRE. Admite a tu mamá y, en la misma frase, reafirma que tu vida está en Panamá. Mentir aquí (decir 'a nadie') es negación segura: ellos ya lo saben." },

{ cat:"familia", key:true,
  q:"¿Hace cuánto vive su mamá allá? ¿Qué documentos o estatus tiene?",
  want:["años","tiempo","residente","papeles","trabaja","desde","estatus"],
  avoid:["no sé","no se","prefiero no","no quiero hablar","no me consta"],
  model:"Vive allá desde hace [tiempo]. Su estatus es [el real, dilo con honestidad].",
  coach:"Antes de la entrevista averigua los datos REALES de tu mamá (hace cuánto está, qué papeles tiene) y dilos con calma. No los inventes ni los evadas; evadir genera más sospecha que la verdad." },

{ cat:"familia", key:true, tricky:true,
  q:"Su mamá viajó a Estados Unidos y se quedó a vivir allá. ¿Cómo sé que usted no hará lo mismo?",

function faceFor(c){
  if(c>=75) return {mood:"happy", label:"El oficial asiente, convencido."};
  if(c>=55) return {mood:"neutral", label:"El oficial mantiene cara neutral."};
  if(c>=35) return {mood:"doubt", label:"El oficial te mira con duda."};
  return {mood:"angry", label:"El oficial frunce el ceño."};
}
function trustColor(c){ return c>=70?"var(--green)":c>=45?"var(--amber)":"var(--red)"; }

function applyRating(r){
  STATE.score[r]++;
  if(r==="good") STATE.confidence=Math.min(100,STATE.confidence+13);
  else if(r==="bad") STATE.confidence=Math.max(0,STATE.confidence-16);
  else STATE.confidence=Math.max(0,STATE.confidence-2);
}
function recordCat(c,r){
  if(!STATE.catScore[c]) STATE.catScore[c]={good:0,total:0};
  STATE.catScore[c].total++;
  if(r==="good") STATE.catScore[c].good++; else if(r==="mid") STATE.catScore[c].good+=.5;
}

/* ================================================================
   EVALUACIÓN DE RESPUESTA LIBRE (heurística)
   ================================================================ */
const GLOBAL_AVOID=["buscar oportunidad","mejores oportunidades","una mejor vida","mejor futuro alla",
  "ver como me va","ver cómo me va","conseguir un trabajo","buscar un trabajo",
  "uno nunca sabe","tal vez me quede","quizá me quede","quizas me quede","quiza me quede"];
function evalAnswer(text,q){
  const t=" "+text.toLowerCase().replace(/[.,;:¡!¿?\n]/g," ").replace(/\s+/g," ")+" ";
  const words=text.trim().split(/\s+/).filter(Boolean).length;
  const has=p=>t.includes(p);
  if((q.avoid||[]).some(has)) return "bad";
  if(GLOBAL_AVOID.some(has)) return "bad";
  if(q.must && !q.must.some(m=>t.includes(" "+m))) return "bad";
  const w=(q.want||[]).filter(has).length;
  if(words<3) return "mid";
  if(w>=2 && words>=5) return "good";
  if(w>=1) return "mid";
  return "mid";
}

function setLen(n,b){STATE.length=n;document.querySelectorAll(".modes button").forEach(x=>x.classList.remove("on"));b.classList.add("on");}

function buildInterview(n){
  const keys=QUESTIONS.filter(q=>q.key);
  const rest=shuffle(QUESTIONS.filter(q=>!q.key));
  if(n>=QUESTIONS.length){ var sel=QUESTIONS.slice(); }
  else{
    var sel=shuffle(keys).slice(0,Math.min(keys.length,Math.ceil(n*0.6)));
    for(const q of rest){if(sel.length>=n)break;sel.push(q);}
    sel=sel.slice(0,n);
  }
  const order={proposito:1,tiempo:2,alojamiento:3,familia:4,finanzas:5,lazos:6,historial:7,trampa:8};
  return shuffle(sel).sort((a,b)=>(order[a.cat]||5)-(order[b.cat]||5));
}
function startInterview(){
  STATE.questions=buildInterview(STATE.length);
  STATE.current=0;STATE.confidence=55;STATE.score={good:0,mid:0,bad:0};STATE.catScore={};
  renderQuestion();
}
function trustCells(c){
  const f=Math.round(c/10);let s="";
  for(let i=0;i<10;i++) s+=`<div class="cell${i<f?" f":""}" style="${i<f?`background:${trustColor(c)}`:""}"></div>`;
  return s;
}

  const f=faceFor(STATE.confidence);

  if(m)m.textContent=f.label;
  if(c)c.innerHTML=trustCells(STATE.confidence);
  if(p)p.textContent=STATE.confidence+"%";

function submitAnswer(){
  if(STATE.answered)return;
  const t=(document.getElementById("fa").value||"").trim();
  if(t.length<2){alert("Escribe tu respuesta primero.");return;}
  STATE.answered=true;
  const q=STATE.questions[STATE.current];
  const r=evalAnswer(t,q);
  applyRating(r);recordCat(q.cat,r);updateOfficer();
  document.getElementById("fa").disabled=true;
  const model=`<div class="model"><b>💡 Respuesta modelo:</b> "${fills(q.model)}"</div>`;
  const coach=`<div class="coach">${fills(q.coach)}</div>`;
  showFB(r,pick(REACT[r]),coach,model);
  showNext();
}

  const last=STATE.current===STATE.questions.length-1;
  document.getElementById("nav").innerHTML=`<button class="btn sm" onclick="confirmQuit()">SALIR</button>
    <div class="spacer"></div><button class="btn go sm" onclick="nextQuestion()">${last?"VEREDICTO ▶":"SIGUIENTE ▶"}</button>`;
}
function nextQuestion(){if(STATE.current<STATE.questions.length-1){STATE.current++;renderQuestion();}else screenResult();}
function confirmQuit(){if(confirm("¿Salir? Perderás el progreso."))screenIntro();}

function screenResult(){
  const {good,mid,bad}=STATE.score,conf=STATE.confidence;
  let stamp,cls,title,msg;
  if(conf>=70&&bad<=1){stamp="VISA APROBADA";cls="app";
    title="\"Su visa fue aprobada. Buen viaje.\"";
    msg="¡Lo lograste, "+val("nombre")+"! Mantuviste la coartada del Mundial, fuiste honesta y mostraste lazos fuertes con Panamá. Esa es la actitud.";}
  else if(conf<40||bad>=4){stamp="VISA NEGADA";cls="den";
    title="\"Lo siento, no califica.\" (formulario 214(b))";
    msg="Varias respuestas no convencieron al oficial. Es práctica: repasa el coaching de cada pregunta, enfócate en que REGRESAS, e inténtalo otra vez.";}
  else{stamp="EN REVISIÓN";cls="pen";
    title="\"Su caso necesita revisión adicional.\"";
    msg="Estuviste cerca, pero algunas respuestas dejaron dudas. Afina lo amarillo/rojo y prueba de nuevo. Vas por buen camino.";}
  let cats="";
  for(const c in STATE.catScore){
    const x=STATE.catScore[c],p=Math.round(x.good/x.total*100);
    const col=p>=70?"var(--green)":p>=40?"var(--amber)":"var(--red)";
    cats+=`<div class="cr"><span class="nm">${CAT_LABELS[c]||c}</span><div class="bar"><span style="width:${p}%;background:${col}"></span></div><span style="width:36px;text-align:right;color:#9fb0d6">${p}%</span></div>`;
  }
  const [cm,cs]=outfitColors();
  render(`
    <span class="tag">VEREDICTO</span>
    <div style="text-align:center">${cristinaSVG(cm,cs,lipColor(),90)}<br><span class="stamp ${cls}">${stamp}</span></div>
    <p class="small" style="text-align:center">${title}</p>
    <p>${msg}</p>
    <div class="scorebar">
      <div class="sb g"><span class="n">${good}</span><span class="l">EXCELENTES</span></div>
      <div class="sb m"><span class="n">${mid}</span><span class="l">REGULARES</span></div>
      <div class="sb b"><span class="n">${bad}</span><span class="l">FLOJAS</span></div>
    </div>
    <h2 class="title sm">Desempeño por tema</h2>
    <div class="cats">${cats}</div>
    <div class="tips">
      <h3>★ CLAVES DE TU CASO</h3>
      <ul>
        <li>Responde <b>corto, claro y honesto</b>. Solo lo que te preguntan.</li>
        <li><b>Lo más difícil:</b> tu mamá se quedó en EE.UU. El oficial lo ve como riesgo. Tu defensa: lazos fuertes con Panamá (UTP, vives con abuela y tío, carro) + viaje corto por el Mundial.</li>
        <li><b>Nunca mientas.</b> Sobre tu mamá, dónde te quedas o negaciones previas. Todo está en su sistema y debe coincidir con tu DS-160.</li>
        <li>La <b>coartada del Mundial</b> solo sirve si es real: lleva tus entradas.</li>
        <li>No menciones a tu mamá tú misma; pero si preguntan, di la verdad y reafirma que regresas.</li>
        <li>Evita: "oportunidades", "quedarme", "ver cómo me va", "uno nunca sabe".</li>
      </ul>
    </div>
    <div class="row">
      <button class="btn green sm" onclick="startInterview()">JUGAR OTRA VEZ ▶</button>
      <button class="btn sm" onclick="goEmbassy()">CAMBIAR LARGO</button>
      <button class="btn sm" onclick="screenIntro()">INICIO</button>
    </div>
  `);
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&STATE.answered){const n=document.querySelector("#nav .btn.go");if(n){e.preventDefault();n.click();}}
});

screenIntro();
</script>
</body>
</html>
